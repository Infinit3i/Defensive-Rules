name: Microsoft Sentinel Deployment

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Sigma/**'
      - 'scripts/sigma_to_sentinel.py'
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - prod
      workspace_name:
        description: 'Sentinel workspace name'
        required: true
        default: 'defensive-rules-dev'
      resource_group:
        description: 'Azure resource group'
        required: true
        default: 'rg-sentinel-dev'

env:
  AZURE_CLI_VERSION: '2.45.0'

jobs:
  validate-rules:
    runs-on: ubuntu-latest
    outputs:
      rules-changed: ${{ steps.changes.outputs.rules }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Check for Sigma rule changes
      id: changes
      run: |
        if git diff --name-only HEAD^ HEAD | grep -E "^Sigma/.*\.yml$"; then
          echo "rules=true" >> $GITHUB_OUTPUT
        else
          echo "rules=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Python
      if: steps.changes.outputs.rules == 'true'
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      if: steps.changes.outputs.rules == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install yamllint pysigma pysigma-backend-splunk

    - name: Validate Sigma rules
      if: steps.changes.outputs.rules == 'true'
      run: |
        echo "Validating Sigma rules..."
        find Sigma -name "*.yml" -o -name "*.yaml" | while read file; do
          echo "Validating $file..."
          yamllint "$file" || echo "Warning: YAML issues in $file"
          python3 -c "import yaml; yaml.safe_load(open('$file'))" || echo "ERROR: Invalid YAML in $file"
        done

    - name: Upload validation results
      if: steps.changes.outputs.rules == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: validation-results
        path: |
          validation-*.log
        retention-days: 7

  convert-to-sentinel:
    runs-on: ubuntu-latest
    needs: validate-rules
    if: needs.validate-rules.outputs.rules-changed == 'true' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pysigma pysigma-backend-splunk yamllint

    - name: Convert Sigma to Sentinel
      run: |
        chmod +x scripts/sigma_to_sentinel.py
        make sentinel

    - name: Validate ARM templates
      run: |
        echo "Validating ARM template structure..."
        if [ -f build/sentinel/analytics-rules-template.json ]; then
          echo "✓ ARM template generated"
          # Basic JSON validation
          python3 -m json.tool build/sentinel/analytics-rules-template.json > /dev/null
          echo "✓ ARM template is valid JSON"

          # Check required ARM template fields
          if jq -e '.resources[0].type' build/sentinel/analytics-rules-template.json | grep -q "Microsoft.OperationalInsights"; then
            echo "✓ ARM template has correct resource types"
          else
            echo "✗ ARM template missing required resource types"
            exit 1
          fi
        else
          echo "✗ ARM template not generated"
          exit 1
        fi

    - name: Upload Sentinel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sentinel-package
        path: |
          build/sentinel/
        retention-days: 30

    - name: Generate deployment summary
      run: |
        echo "## Sentinel Conversion Results" >> $GITHUB_STEP_SUMMARY
        if [ -f build/sentinel/conversion-report.json ]; then
          SUCCESS=$(jq '.success | length' build/sentinel/conversion-report.json)
          FAILURES=$(jq '.failures | length' build/sentinel/conversion-report.json)
          TECHNIQUES=$(jq '.mitre_coverage | keys | length' build/sentinel/conversion-report.json)
          echo "- **Analytics Rules Generated:** $SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "- **Conversion Failures:** $FAILURES" >> $GITHUB_STEP_SUMMARY
          echo "- **MITRE Techniques Covered:** $TECHNIQUES" >> $GITHUB_STEP_SUMMARY
          echo "- **ARM Template:** build/sentinel/analytics-rules-template.json" >> $GITHUB_STEP_SUMMARY
        fi

  deploy-to-sentinel:
    runs-on: ubuntu-latest
    needs: convert-to-sentinel
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}

    steps:
    - name: Download Sentinel artifacts
      uses: actions/download-artifact@v4
      with:
        name: sentinel-package
        path: sentinel-package/

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set environment variables
      run: |
        echo "WORKSPACE_NAME=${{ github.event.inputs.workspace_name }}" >> $GITHUB_ENV
        echo "RESOURCE_GROUP=${{ github.event.inputs.resource_group }}" >> $GITHUB_ENV
        echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV

    - name: Verify Sentinel workspace exists
      run: |
        echo "Checking if Sentinel workspace exists..."
        if az monitor log-analytics workspace show \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --workspace-name ${{ env.WORKSPACE_NAME }} > /dev/null 2>&1; then
          echo "✓ Workspace ${{ env.WORKSPACE_NAME }} exists"
        else
          echo "✗ Workspace ${{ env.WORKSPACE_NAME }} not found in resource group ${{ env.RESOURCE_GROUP }}"
          echo "Please create the workspace first or check the names"
          exit 1
        fi

    - name: Deploy ARM template (Dry Run)
      if: github.event.inputs.environment == 'dev'
      run: |
        echo "Performing dry run deployment..."
        az deployment group validate \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --template-file sentinel-package/analytics-rules-template.json \
          --parameters workspaceName=${{ env.WORKSPACE_NAME }}

    - name: Deploy analytics rules to Sentinel
      if: github.event.inputs.environment != 'dev'
      run: |
        echo "Deploying analytics rules to Sentinel workspace..."

        # Deploy ARM template
        az deployment group create \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --template-file sentinel-package/analytics-rules-template.json \
          --parameters workspaceName=${{ env.WORKSPACE_NAME }} \
          --name "defensive-rules-$(date +%Y%m%d%H%M%S)"

        echo "✓ Analytics rules deployed successfully"

    - name: Verify deployment
      if: github.event.inputs.environment != 'dev'
      run: |
        echo "Verifying deployment..."

        # Count deployed rules
        RULE_COUNT=$(az sentinel alert-rule list \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --workspace-name ${{ env.WORKSPACE_NAME }} \
          --query "length([?contains(displayName, 'Suspicious') || contains(displayName, 'Detection')])" \
          --output tsv)

        echo "✓ Found $RULE_COUNT deployed analytics rules"
        echo "Deployment verification completed"

    - name: Post deployment summary
      run: |
        echo "## Sentinel Deployment Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Workspace:** ${{ env.WORKSPACE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Resource Group:** ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.event.inputs.environment }}" != "dev" ]; then
          echo "- **Status:** ✅ Deployed Successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Status:** ✅ Dry Run Completed" >> $GITHUB_STEP_SUMMARY
        fi

  cleanup:
    runs-on: ubuntu-latest
    needs: [convert-to-sentinel, deploy-to-sentinel]
    if: always() && github.event_name == 'workflow_dispatch'

    steps:
    - name: Cleanup old deployments
      if: github.event.inputs.environment == 'prod'
      continue-on-error: true
      run: |
        az login --service-principal \
          --username ${{ secrets.AZURE_CLIENT_ID }} \
          --password ${{ secrets.AZURE_CLIENT_SECRET }} \
          --tenant ${{ secrets.AZURE_TENANT_ID }}

        # Keep only last 5 deployments
        OLD_DEPLOYMENTS=$(az deployment group list \
          --resource-group ${{ github.event.inputs.resource_group }} \
          --query "[?starts_with(name, 'defensive-rules-')] | sort_by(@, &timestamp) | [0:-5].name" \
          --output tsv)

        for deployment in $OLD_DEPLOYMENTS; do
          echo "Cleaning up old deployment: $deployment"
          az deployment group delete \
            --resource-group ${{ github.event.inputs.resource_group }} \
            --name $deployment || true
        done