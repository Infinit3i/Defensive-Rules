name: Comprehensive Rule Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

jobs:
  sigma-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pysigma pysigma-backend-splunk pysigma-backend-microsoft365defender yamllint

      - name: Validate YAML syntax
        run: |
          yamllint Sigma/ -d "{extends: default, rules: {line-length: {max: 200}}}"

      - name: Run Sigma validation
        run: |
          python scripts/test_framework.py --output sigma-test-results.json

      - name: Upload test results
        uses: actions/upload-artifact@v5
        with:
          name: sigma-test-results
          path: sigma-test-results.json

  conversion-testing:
    runs-on: ubuntu-latest
    needs: sigma-validation
    strategy:
      matrix:
        platform: [splunk, sentinel]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pysigma pysigma-backend-splunk pysigma-backend-microsoft365defender

      - name: Test ${{ matrix.platform }} conversion
        run: |
          mkdir -p test-results/${{ matrix.platform }}
          python scripts/sigma_to_${{ matrix.platform }}.py \
            --input-dir Sigma/ \
            --output-dir test-results/${{ matrix.platform }}/output \
            --validate-only

      - name: Upload conversion results
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.platform }}-conversion-results
          path: test-results/${{ matrix.platform }}/

  yara-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install YARA
        run: |
          sudo apt-get update
          sudo apt-get install -y yara

      - name: Validate YARA rules
        run: |
          for rule in Yara/*.yar; do
            echo "Validating $rule"
            yara "$rule" /dev/null || exit 1
          done

      - name: Test YARA rules syntax
        run: |
          yara --help > /dev/null
          find Yara/ -name "*.yar" -exec yara {} /dev/null \;

  mitre-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Generate MITRE coverage report
        run: |
          python -c "
          import yaml, os, json
          from collections import defaultdict

          techniques = set()
          tactics = set()

          for root, dirs, files in os.walk('Sigma'):
              for file in files:
                  if file.endswith('.yml'):
                      try:
                          with open(os.path.join(root, file)) as f:
                              data = yaml.safe_load(f)
                          tags = data.get('tags', [])
                          for tag in tags:
                              if isinstance(tag, str):
                                  if tag.startswith('attack.t') and not tag.startswith('attack.tactic'):
                                      techniques.add(tag.replace('attack.', '').upper())
                                  elif tag.startswith('attack.') and not tag.startswith('attack.t'):
                                      tactics.add(tag.replace('attack.', ''))
                      except: continue

          coverage = {
              'techniques': sorted(list(techniques)),
              'tactics': sorted(list(tactics)),
              'technique_count': len(techniques),
              'tactic_count': len(tactics)
          }

          with open('mitre-coverage.json', 'w') as f:
              json.dump(coverage, f, indent=2)

          print(f'MITRE Coverage: {len(techniques)} techniques, {len(tactics)} tactics')
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: mitre-coverage-report
          path: mitre-coverage.json

  soar-integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SOAR dependencies
        run: |
          pip install requests

      - name: Test SOAR integration
        run: |
          cd scripts
          python -c "
          import soar_integration
          from datetime import datetime

          # Test alert creation
          alert = soar_integration.Alert(
              id='test-workflow-001',
              title='Workflow Test Alert',
              severity='medium',
              description='Test alert for CI/CD validation',
              source_system='GitHub Actions',
              timestamp=datetime.now(),
              entities=[{'type': 'host', 'value': 'test-host'}],
              mitre_techniques=['T1059.001'],
              raw_data={'test': True}
          )

          print(f'SOAR test passed: Alert ID {alert.id}')
          "

  package-validation:
    runs-on: ubuntu-latest
    needs: [sigma-validation, conversion-testing]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pysigma pysigma-backend-splunk pysigma-backend-microsoft365defender

      - name: Build packages
        run: |
          make clean
          make convert
          make package

      - name: Validate package structure
        run: |
          test -f build/splunk-es-defensive-rules-*.tar.gz
          test -f build/sentinel-analytics-rules-*.zip

      - name: Upload packages
        uses: actions/upload-artifact@v5
        with:
          name: siem-packages
          path: build/*.tar.gz

  performance-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pysigma pysigma-backend-splunk memory-profiler psutil

      - name: Performance test
        run: |
          python -c "
          import time, psutil, os
          from pathlib import Path

          start_time = time.time()
          start_memory = psutil.Process(os.getpid()).memory_info().rss / 1024 / 1024

          # Count rules
          rule_count = len(list(Path('Sigma').rglob('*.yml')))
          yara_count = len(list(Path('Yara').rglob('*.yar')))

          end_time = time.time()
          end_memory = psutil.Process(os.getpid()).memory_info().rss / 1024 / 1024

          print(f'Performance metrics:')
          print(f'  Rules processed: {rule_count} Sigma + {yara_count} YARA')
          print(f'  Processing time: {end_time - start_time:.2f} seconds')
          print(f'  Memory usage: {end_memory - start_memory:.2f} MB')
          "