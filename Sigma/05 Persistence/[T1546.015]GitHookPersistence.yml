title: Git Hook Persistence via Hook Script Creation
id: f6a7b8c9-2345-6789-0123-ef0123456789
status: experimental
description: Detects Git hook script creation or modification for persistence
author: Infinit3i
date: 2026/04/27
logsource:
    product: linux
    service: auditd
detection:
    selection:
        type: 'SYSCALL'
        syscall:
            - 'openat'
            - 'write'
            - 'creat'
            - 'chmod'
        name|contains: '/.git/hooks/'
    selection_hook:
        name|endswith:
            - 'pre-commit'
            - 'post-commit'
            - 'pre-push'
            - 'post-receive'
            - 'pre-receive'
    condition: selection and selection_hook
level: medium
tags:
  - attack.persistence
  - attack.t1546.015
  - auditd
  - linux
references:
    - https://attack.mitre.org/techniques/T1546/015/
