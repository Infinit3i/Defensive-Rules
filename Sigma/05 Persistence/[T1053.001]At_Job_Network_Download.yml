title: At Job Network Download and Execute
id: h8i9j0k1-l2m3-4567-8901-234567hijklm
status: experimental
description: Detects at jobs that download and execute files from remote sources for persistence
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1053/001/
  - https://pubs.opengroup.org/onlinepubs/9699919799/utilities/at.html
logsource:
  product: linux
  service: auditd
detection:
  selection_at_process:
    - type: EXECVE
      a0|contains:
        - /usr/bin/at
        - /bin/at
        - atd
  selection_network_tools:
    - a1|contains:
        - wget
        - curl
        - ftp
        - sftp
        - rsync
        - scp
  selection_execution_pattern:
    - a1|re: '.*[|&;]\s*(chmod|bash|sh|python|perl)'
  selection_at_spool:
    - type: PATH
      name|startswith: /var/spool/at/
  condition: (selection_at_process and selection_network_tools and selection_execution_pattern) or selection_at_spool
level: high
tags:
  - attack.persistence
  - attack.execution
  - attack.command-and-control
  - attack.t1053
  - attack.t1053.001
  - linux
  - auditd
  - scheduled-task
falsepositives:
  - Legitimate software update scripts
  - Scheduled data synchronization tasks
