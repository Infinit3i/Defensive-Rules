---
title: Winlogon Shell Replacement Persistence
technique: T1546.002
id: d7a3b8c4-2f5e-4a9b-8c6d-3e1f7a9c2b5e
status: experimental
description: >-
  Detects suspicious modifications to Winlogon Shell registry key for persistence through shell replacement
author: Infinit3i
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
  category: registry_set
detection:
  selection_event:
  EventID:
  selection_shell:
  TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\Shell'
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\Userinit'
  selection_suspicious:
  Details|contains:
      - 'cmd.exe'
      - 'powershell.exe'
      - 'pwsh.exe'
      - '.bat'
      - '.vbs'
      - '.ps1'
      - '.exe,'
  filter_legitimate:
  Details:
      - 'explorer.exe'
      - 'C:\Windows\system32\userinit.exe,C:\Windows\system32\logonui.exe'
  condition: selection_event and selection_shell and (selection_suspicious or not filter_legitimate)
fields:
  - Image
  - TargetObject
  - Details
  - ProcessId
  - User
  - ComputerName
falsepositives:
  - Custom shell replacements by administrators
  - Kiosk mode configurations
  - Remote desktop configurations
level: critical
tags:
  - attack.persistence
  - attack.t1546.002
  - windows
  - sysmon
  - attack.t1546
