---
title: Service DLL Hijacking Persistence
technique: T1574.001
id: d4e5f678-9012-3456-789a-bcdef0123456
status: experimental
description: Detects DLL hijacking attempts targeting Windows services for persistence
author: Infinit3i
date: 2026-04-27
references:
  - https://attack.mitre.org/techniques/T1574/001/
logsource:
  product: windows
  service: sysmon
detection:
  dll_creation:
  EventID:
  TargetFilename|contains:
      - '\System32\'
      - '\SysWOW64\'
  TargetFilename|endswith:
  service_dll_load:
  EventID:
  ImageLoaded|contains:
      - '\System32\'
      - '\SysWOW64\'
  ImageLoaded|endswith:
  suspicious_dll_creation:
  EventID:
  TargetFilename|contains:
      - '\System32\wbem\'
      - '\System32\WindowsPowerShell\'
      - '\System32\config\systemprofile\'
  TargetFilename|endswith:
  service_modification:
  EventID:
  CommandLine|contains:
      - 'sc config'
      - 'reg add'
  CommandLine|contains|all:
      - 'ServiceDll'
      - '.dll'
  condition: (dll_creation and service_dll_load) or suspicious_dll_creation or service_modification
fields:
  - TargetFilename
  - ImageLoaded
  - Image
  - CommandLine
  - ProcessId
  - User
  - ComputerName
falsepositives:
  - Software installations and updates
  - System file repairs
  - Security software operations
level: high
tags:
  - attack.persistence
  - attack.t1574.001
  - windows
  - sysmon
  - attack.privilege_escalation
  - attack.t1574
