title: Image File Execution Options Injection
id: 5e6f7890-1234-5678-9012-3456789abcde
status: experimental
description: >-
  Detects IFEO registry modifications for process execution redirection and persistence
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1546/012/
  - https://oddvar.moe/2018/04/10/persistence-using-globalflags-in-image-file-execution-options-hidden-from-autoruns-exe/
logsource:
  product: windows
  service: sysmon
detection:
  selection_ifeo:
  EventID:
  TargetObject|contains:
  selection_debugger:
  EventID:
  TargetObject|endswith:
  Details|contains:
      - '.exe'
      - 'cmd.exe'
      - 'powershell.exe'
      - 'rundll32.exe'
  selection_globalflag:
  EventID:
  TargetObject|endswith:
  Details:
      - '0x200'
      - '512'
  selection_verifierdlls:
  EventID:
  TargetObject|endswith:
  Details|contains:
  condition: selection_ifeo and (selection_debugger or selection_globalflag or selection_verifierdlls)
fields:
  - TargetObject
  - Details
  - Image
  - ProcessId
falsepositives:
  - Debugging and development tools
  - Application troubleshooting
  - System administration utilities
level: high
tags:
  - attack.persistence
  - attack.t1546.012
  - sysmon
  - windows
  - registry
