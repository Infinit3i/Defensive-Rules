title: SSH Public Key Addition to Authorized Keys
id: 2c8f6e4a-9d3b-7f5e-4a6c-8e2f5d9b3c7a
status: experimental
description: Detects addition of new SSH public keys to authorized_keys files
author: Infinit3i
date: 2026/04/27
logsource:
  product: linux
  service: syslog
detection:
  selection_ssh_keygen:
    program:
    message|contains:
  selection_key_add:
    program:
      - "cat"
      - "echo"
      - "tee"
    message|contains:
      - "authorized_keys"
      - "ssh-rsa"
      - "ssh-ed25519"
      - "ssh-dss"
  selection_suspicious_timing:
    facility:
    message|contains:
      - "Accepted publickey"
      - "Failed publickey"
  condition: selection_key_add or (selection_ssh_keygen and selection_suspicious_timing)
level: medium
tags:
  - attack.persistence
  - attack.t1098
  - attack.t1098.004
  - linux
  - syslog
references:
  - https://attack.mitre.org/techniques/T1098/004/
falsepositives:
  - Legitimate SSH key deployment
  - User adding their own keys
