title: COM Object Hijacking via Registry Modification
id: 1a2b3c4d-5e6f-7890-1234-56789abcdef0
status: experimental
description: Detects COM object hijacking through HKCR registry modifications for persistence
author: Infinit3i
date: 2026/04/27
references:
    - https://attack.mitre.org/techniques/T1546/015/
    - https://www.elastic.co/guide/en/security/current/com-hijacking-via-registry.html
logsource:
    product: windows
    service: sysmon
detection:
    selection_registry:
        EventID: 13
        TargetObject|startswith:
            - 'HKEY_LOCAL_MACHINE\SOFTWARE\Classes\CLSID\'
            - 'HKEY_CURRENT_USER\SOFTWARE\Classes\CLSID\'
            - 'HKLM\SOFTWARE\Classes\CLSID\'
            - 'HKCU\SOFTWARE\Classes\CLSID\'
    selection_inprocserver:
        EventID: 13
        TargetObject|contains: '\InprocServer32\'
        Details|contains:
            - '.dll'
            - '.exe'
    selection_suspicious_path:
        EventID: 13
        Details|contains:
            - '\Users\'
            - '\Temp\'
            - '\AppData\'
            - '\ProgramData\'
            - 'C:\Windows\Tasks\'
    condition: selection_registry and selection_inprocserver and selection_suspicious_path
fields:
    - TargetObject
    - Details
    - ProcessId
    - Image
falsepositives:
    - Legitimate software installations
    - System updates
    - Developer tools registration
level: high
tags:
    - attack.persistence
    - attack.t1546.015
    - sysmon
    - windows
    - registry