title: PowerShell Profile Persistence via Profile Script Modification
id: 9c0d1e23-6f78-9012-3456-789abcdef012
status: experimental
description: Detects PowerShell profile script modification for persistence execution
author: Infinit3i
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
detection:
  selection:
  EventID:
  TargetFilename|contains:
      - 'Microsoft.PowerShell_profile.ps1'
      - 'profile.ps1'
      - '\WindowsPowerShell\'
      - '\PowerShell\7\'
  TargetFilename|endswith:
  condition: selection
level: medium
tags:
  - attack.persistence
  - attack.t1546.013
  - sysmon
  - windows
  - powershell
references:
  - https://attack.mitre.org/techniques/T1546/013/
