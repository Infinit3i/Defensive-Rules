title: Udev Rules Persistence via Malicious Device Trigger
id: c3d4e5f6-g7h8-9012-3456-789012cdefgh
status: experimental
description: Detects creation of suspicious udev rules that execute commands when devices are connected for persistence
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1037/001/
  - https://linux.die.net/man/8/udev
logsource:
  product: linux
  service: auditd
detection:
  selection_udev_path:
  - type: PATH
      name|contains:
    - /etc/udev/rules.d/
    - /lib/udev/rules.d/
    - /run/udev/rules.d/
  selection_file_creation:
  - type: SYSCALL
      syscall: openat
      a2: 577  # O_WRONLY|O_CREAT
  selection_suspicious_content:
  - comm|contains:
    - RUN+=
    - PROGRAM=
    - /bin/bash
    - /bin/sh
    - wget
    - curl
    - nc
    - python
    - perl
    - reverse
    - shell
  condition: selection_udev_path and selection_file_creation and selection_suspicious_content
level: high
tags:
  - attack.persistence
  - attack.t1037
  - attack.t1037.001
  - linux
  - auditd
  - udev
falsepositives:
  - Legitimate udev rules for hardware management
  - System administrator device automation scripts
