title: LD_PRELOAD Environment Variable Manipulation
id: 8f4e6c2a-5d9b-3e7f-1a8c-6e4f2d8b5c3a
status: experimental
description: Detects manipulation of LD_PRELOAD for library preloading persistence
author: Infinit3i
date: 2026/04/27
logsource:
    product: linux
    service: auditd
detection:
    selection_env:
        type: "SYSCALL"
        syscall: ["execve", "execveat"]
    selection_preload:
        a0|contains: "LD_PRELOAD"
    selection_preload_file:
        type: "SYSCALL"
        syscall: "openat"
        name: "/etc/ld.so.preload"
        a2: ["O_WRONLY", "O_RDWR", "O_APPEND"]
    selection_export:
        comm: ["bash", "sh", "zsh"]
        proctitle|contains:
            - "export LD_PRELOAD"
            - "setenv LD_PRELOAD"
    condition: (selection_env and selection_preload) or
               selection_preload_file or selection_export
level: high
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1574
  - attack.t1574.006
  - linux
  - auditd
references:
    - https://attack.mitre.org/techniques/T1574/006/
falsepositives:
    - Debugging with LD_PRELOAD
    - Legitimate library interposition
