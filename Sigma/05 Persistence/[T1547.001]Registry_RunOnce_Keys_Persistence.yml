title: Registry RunOnce Keys Persistence Detection
id: c3d4e5f6-g7h8-9012-3456-789012cdefgh
status: experimental
description: Detects suspicious persistence via RunOnce registry keys with focus on evasive techniques
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1547/001/
logsource:
  product: windows
  service: sysmon
detection:
  selection_reg:
    EventID: 13
    TargetObject|contains:
      - '\Software\Microsoft\Windows\CurrentVersion\RunOnce\'
      - '\Software\Microsoft\Windows\CurrentVersion\RunOnceEx\'
  selection_evasive:
    - Details|contains:
      - 'regsvr32 /s'
      - 'mshta'
      - 'certutil'
      - 'bitsadmin'
      - 'ping -n'
      - 'timeout'
      - 'sleep'
    - Details|re: '.*\\x[0-9a-fA-F]{2}.*'
    - Details|re: '.*[A-Za-z0-9+/]{20,}={0,2}.*'
  selection_location:
    Details|contains:
      - '\AppData\Roaming\'
      - '\AppData\Local\'
      - '\Users\Public\'
      - '\Windows\Temp\'
      - '\ProgramData\'
  condition: selection_reg and (selection_evasive or selection_location)
falsepositives:
  - Software installers using RunOnce
  - System updates
level: high
tags:
  - attack.persistence
  - attack.t1547
  - attack.t1547.001
  - sysmon
  - windows
