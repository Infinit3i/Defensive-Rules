title: PAM Module Backdoor Installation
id: e5f6g7h8-i9j0-1234-5678-901234efghij
status: experimental
description: Detects installation of malicious PAM modules that could bypass authentication mechanisms
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1556/003/
  - https://linux.die.net/man/5/pam.conf
logsource:
  product: linux
  service: auditd
detection:
  selection_pam_paths:
  - type: PATH
      name|contains:
    - /lib/security/
    - /lib64/security/
    - /usr/lib/security/
    - /usr/lib64/security/
    - /etc/pam.d/
  selection_file_operations:
  - type: SYSCALL
      syscall: openat
      a2: 577  # O_WRONLY|O_CREAT
  selection_suspicious_names:
  - comm|contains:
    - pam_backdoor
    - pam_evil
    - pam_bypass
    - pam_rootkit
    - pam_stealth
    - .so.bak
    - .so.orig
  condition: selection_pam_paths and selection_file_operations and selection_suspicious_names
level: critical
tags:
  - attack.credential-access
  - attack.persistence
  - attack.t1556
  - attack.t1556.003
  - linux
  - auditd
  - pam
falsepositives:
  - PAM module updates during system maintenance
  - Legitimate security module installations
