title: Bootloader Persistence via GRUB Configuration Modification
id: a1b2c3d4-e5f6-7890-1234-567890abcdef
status: experimental
description: Detects modifications to GRUB bootloader configuration files that could enable persistence through boot-time execution
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1547/001/
  - https://www.grub.org/manual/grub/html_node/Configuration.html
logsource:
  product: linux
  service: auditd
detection:
  selection_grub_files:
    - type: PATH
      name|contains:
        - /boot/grub/grub.cfg
        - /boot/grub2/grub.cfg
        - /etc/grub.d/
        - /etc/default/grub
  selection_suspicious_commands:
    - type: EXECVE
      a0|contains:
        - grub-mkconfig
        - grub2-mkconfig
        - update-grub
        - grub-install
  selection_file_write:
    - type: SYSCALL
      syscall: openat
      a2: 577  # O_WRONLY|O_CREAT
  condition: (selection_grub_files and selection_file_write) or selection_suspicious_commands
level: high
tags:
  - attack.persistence
  - attack.t1547
  - attack.t1547.001
  - linux
  - auditd
  - bootloader
falsepositives:
  - Legitimate GRUB configuration updates during system maintenance
  - Package manager updates affecting GRUB
