title: DLL Search Order Hijacking Detection
id: 3c4d5e6f-7890-1234-5678-9abcdef01234
status: experimental
description: >-
  Detects DLL hijacking through search order exploitation and suspicious DLL loading
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1574/001/
  - https://www.mandiant.com/resources/dll-search-order-hijacking-revisited
logsource:
  product: windows
  service: sysmon
detection:
  selection_image_load:
    EventID: 1
    Signed:
  selection_suspicious_path:
    EventID: 1
    ImageLoaded|contains:
      - '\Users\'
      - '\Temp\'
      - '\AppData\'
      - '\ProgramData\'
      - 'C:\Windows\Tasks\'
  selection_common_hijack:
    EventID: 1
    ImageLoaded|endswith:
      - '\version.dll'
      - '\uxtheme.dll'
      - '\dwmapi.dll'
      - '\winmm.dll'
      - '\wtsapi32.dll'
  selection_system_process:
    EventID: 1
    Image|endswith:
      - '\explorer.exe'
      - '\winlogon.exe'
      - '\csrss.exe'
      - '\services.exe'
  condition: |
    selection_image_load and selection_suspicious_path and
    (selection_common_hijack or selection_system_process)
fields:
  - Image
  - ImageLoaded
  - Signed
  - Signature
falsepositives:
  - Legitimate third-party DLLs
  - Software development environments
  - Portable applications
level: high
tags:
  - attack.persistence
  - attack.defense_evasion
  - attack.t1574.001
  - sysmon
  - windows
  - dll
