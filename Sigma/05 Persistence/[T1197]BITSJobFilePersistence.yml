title: BITS Job Creation for Persistent File Transfer
id: b2c3d4e5-8901-2345-6789-abcdef012345
status: experimental
description: Detects BITS job creation for persistent file transfer and execution
author: Infinit3i
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
detection:
  selection_cmd:
    EventID: 1
    Image|endswith:
    CommandLine|contains:
      - '/create'
      - '/addfile'
      - '/setnotifycmdline'
      - '/resume'
  selection_powershell:
    EventID: 1
    CommandLine|contains:
      - 'Start-BitsTransfer'
      - 'Add-BitsFile'
      - 'Complete-BitsTransfer'
  condition: selection_cmd or selection_powershell
level: medium
tags:
  - attack.persistence
  - attack.t1197
  - sysmon
  - windows
references:
  - https://attack.mitre.org/techniques/T1197/
