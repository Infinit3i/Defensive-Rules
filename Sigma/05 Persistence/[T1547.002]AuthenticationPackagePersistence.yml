---
title: Authentication Package Persistence Detection
technique: T1547.002
id: e9b4c7d1-3a8f-4e2b-9c5d-7f1a6e8b4c9d
status: experimental
description: Detects suspicious authentication package persistence through LSA modifications or DLL loading
author: Infinit3i
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
  category: registry_set
detection:
  selection_event:
    EventID: 13
  selection_lsa:
    TargetObject|contains:
      - '\SYSTEM\CurrentControlSet\Control\Lsa\Authentication Packages'
      - '\SYSTEM\CurrentControlSet\Control\Lsa\OSConfig\Authentication Packages'
      - '\SYSTEM\CurrentControlSet\Control\Lsa\Security Packages'
  selection_suspicious:
    Details|contains:
      - '.dll'
  filter_msv:
    Details|contains:
      - 'msv1_0'
      - 'kerberos'
      - 'negotiate'
      - 'ntlmssp'
      - 'schannel'
      - 'wdigest'
      - 'tspkg'
      - 'pku2u'
      - 'livessp'
  condition: selection_event and selection_lsa and selection_suspicious and not filter_msv
fields:
  - Image
  - TargetObject
  - Details
  - ProcessId
  - User
  - ComputerName
falsepositives:
  - Third-party authentication providers
  - Smart card authentication software
  - Custom security solutions
level: critical
tags:
    # MITRE ATT&CK tactic
    - attack.persistence
    # MITRE ATT&CK technique
    - attack.t1547.002
    # Platform/tool tags
    - windows
    - sysmon
  - attack.persistence
  - attack.t1547
  - attack.t1547.002
  - sysmon
  - windows