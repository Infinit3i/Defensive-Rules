title: BITS Job Scheduled Execution via Notification Command
id: c3d4e5f6-9012-3456-7890-bcdef0123456
status: experimental
description: Detects BITS job execution through notification command scheduling
author: Infinit3i
date: 2026/04/27
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 1
        ParentImage|endswith: '\svchost.exe'
        ParentCommandLine|contains: 'BITS'
        Image|contains:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\rundll32.exe'
            - '\regsvr32.exe'
    condition: selection
level: high
tags:
  - attack.persistence
  - attack.t1197
  - sysmon
  - windows
references:
    - https://attack.mitre.org/techniques/T1197/
