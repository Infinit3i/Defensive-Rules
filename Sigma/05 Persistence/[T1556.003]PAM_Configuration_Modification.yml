title: PAM Configuration Modification for Authentication Bypass
id: f6g7h8i9-j0k1-2345-6789-012345fghijk
status: experimental
description: Detects modifications to PAM configuration files that could weaken authentication requirements
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1556/003/
  - https://www.linux-pam.org/Linux-PAM-html/Linux-PAM_SAG.html
logsource:
  product: linux
  service: auditd
detection:
  selection_pam_configs:
    - type: PATH
      name|contains:
        - /etc/pam.d/common-auth
        - /etc/pam.d/common-password
        - /etc/pam.d/sshd
        - /etc/pam.d/login
        - /etc/pam.d/su
        - /etc/pam.d/sudo
        - /etc/pam.conf
  selection_write_operations:
    - type: SYSCALL
      syscall: write
  selection_suspicious_content:
    - comm|contains:
        - sufficient
        - optional
        - nullok_secure
        - try_first_pass
        - use_first_pass
        - pam_permit
        - pam_deny
  condition: selection_pam_configs and selection_write_operations and selection_suspicious_content
level: high
tags:
  - attack.credential-access
  - attack.persistence
  - attack.t1556
  - attack.t1556.003
  - linux
  - auditd
  - pam
falsepositives:
  - System administrator authentication policy changes
  - Security hardening activities
