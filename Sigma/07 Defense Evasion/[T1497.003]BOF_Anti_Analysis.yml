---
title: BOF Anti-Analysis and Evasion Techniques
technique: T1497.003
id: e9f0a1b2-3c4d-5678-9012-cdef34567890
status: experimental
description: Detects BOF evasion through timing delays and environment checks
author: matthewiver@protonmail.com
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1497/003/
  - https://www.cobaltstrike.com/blog/beacon-object-files-luser-defined-reflective-loader/
logsource:
  product: windows
  service: sysmon
detection:
  timing_evasion:
  EventID:
  CommandLine|contains:
      - 'timeout'
      - 'ping -n'
      - 'start /wait'
  ParentImage|endswith:
      - '\rundll32.exe'
      - '\regsvr32.exe'
  vm_detection:
  EventID:
  CommandLine|contains:
      - 'systeminfo'
      - 'wmic computersystem'
      - 'reg query'
  Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
  sandbox_checks:
  EventID:
  TargetFilename|contains:
      - 'vmware'
      - 'vbox'
      - 'sandbox'
  Image|contains:
      - 'temp'
      - 'appdata'
  condition: timing_evasion or (vm_detection and sandbox_checks)
fields:
  - CommandLine
  - Image
  - ParentImage
  - TargetFilename
  - ProcessId
  - ParentProcessId
falsepositives:
  - System diagnostics tools
  - IT management scripts
  - Performance monitoring
level: medium
tags:
  - attack.defense_evasion
  - attack.t1497.003
  - bof
  - anti_analysis
  - evasion
  - timing_attack
  - vm_detection
  - sysmon
  - windows
