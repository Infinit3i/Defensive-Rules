---
title: Syscall strings or inline syscall opcodes in scriptblocks
technique: T1106
id: 5d0f6b3c-8e4a-4f67-9c8d-2b3f4e5d6c7b
status: experimental
description: >-
  > Detect occurrences of "syscall" usage strings or inline syscall opcodes in scripts or commandlines (shellcode-like patterns, raw syscall numbers) that indicate attempts to invoke native
  syscalls directly.
author: Infinit3i
date: 2025-10-19
references:
  - https://attack.mitre.org/techniques/T1106/
tags:
  - attack.defense_evasion
  - attack.t1106
  - windows
  - powershell
logsource:
  product: windows
  service: powershell
detection:
  selection:
    EventID:
    ScriptBlockText|contains:
      - "syscall"
      - "mov r10"
      - "mov eax"
      - "0x"
  condition: selection
falsepositives:
  - Developers embedding assembly snippets or legitimate security tools including inline assembly for testing.
level: high
