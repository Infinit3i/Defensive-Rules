title: Sleep-Based Sandbox Evasion Techniques
id: d1e2f3g4-h5i6-7890-abcd-222222222222
status: experimental
description: Detects sleep-based sandbox evasion
author: Matthew Iverson
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: 1
    CommandLine|re: '.*(Sleep|sleep|timeout|ping.*-n|choice.*-t)\s+[3-9][0-9].*'
  condition: selection
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
falsepositives:
  - System scripts
  - Backup operations
level: medium
tags:
  - attack.defense-evasion
  - attack.t1497.003
  - sysmon
  - windows