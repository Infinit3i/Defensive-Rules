---
title: Web Service Disruption
technique: T1489
id: c1d2e3f4-g5h6-7890-abcd-555555555555
status: experimental
description: Detects attempts to stop web services
author: Infinit3i
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
detection:
  selection:
  EventID:
  CommandLine|contains:
      - 'stop'
      - 'delete'
      - 'config'
      - 'disable'
  web_services:
  CommandLine|contains:
      - 'W3SVC'
      - 'IISADMIN'
      - 'WAS'
      - 'Apache'
      - 'Nginx'
      - 'Tomcat'
      - 'JBoss'
      - 'Jetty'
      - 'GlassFish'
      - 'WebSphere'
      - 'WebLogic'
      - 'NodeJS'
      - 'PM2'
  condition: selection and web_services
fields:
  - Image
  - CommandLine
  - User
  - ProcessId
falsepositives:
  - Web server maintenance
  - Service updates
  - Planned maintenance
level: high
tags:
  - attack.impact
  - attack.t1489
  - windows
  - sysmon
