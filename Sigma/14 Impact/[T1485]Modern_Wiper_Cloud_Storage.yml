title: Modern Wiper Malware Targeting Cloud Storage
id: 6e4f7a8b-9c2d-5e3f-7a6e-4f8b2c5d9a3e
status: experimental
description: Detects modern wiper malware targeting cloud storage services. Monitors mass file deletion and storage API abuse.
author: Cybersecurity Detection Engineering
date: 2024-12-01
modified: 2026-04-27
references:
    - https://attack.mitre.org/techniques/T1485/
    - https://attack.mitre.org/techniques/T1070.004/
logsource:
    product: windows
    service: sysmon
detection:
    selection_cloud_sync_paths:
        EventID: 11
        TargetFilename|contains:
            - '\OneDrive\'
            - '\Google Drive\'
            - '\Dropbox\'
            - '\Box Sync\'
            - '\iCloudDrive\'
            - '\pCloud\'
            - '\MEGA\'
        TargetFilename|endswith:
            - '.tmp'
            - '.lock'
            - '.conflict'
            - '.deleted'
    selection_mass_deletion:
        EventID: 23  # File Delete
        Image|contains:
            - 'wiper'
            - 'destroy'
            - 'shred'
            - 'erase'
        TargetFilename|contains:
            - '\OneDrive\'
            - '\Google Drive\'
            - '\Dropbox\'
    selection_sync_manipulation:
        EventID: 1
        Image|endswith:
            - '\OneDrive.exe'
            - '\GoogleDriveSync.exe'
            - '\Dropbox.exe'
            - '\Box.exe'
        CommandLine|contains:
            - '/shutdown'
            - '/reset'
            - '/unlink'
            - '/signout'
            - '/pause'
    selection_api_abuse:
        EventID: 3
        DestinationHostname|contains:
            - 'onedrive.live.com'
            - 'drive.google.com'
            - 'dropbox.com'
            - 'box.com'
            - 's3.amazonaws.com'
            - 'blob.core.windows.net'
            - 'storage.googleapis.com'
        DestinationPort: 443
    selection_powershell_destruction:
        EventID: 4104
        ScriptBlockText|contains:
            - 'Remove-Item'
            - 'Clear-Content'
            - 'Set-Content'
            - 'Out-File'
            - 'OneDrive'
            - 'Google Drive'
            - 'Dropbox'
            - 'Box'
            - '-Recurse'
            - '-Force'
    selection_registry_manipulation:
        EventID: 13  # Registry value set
        TargetObject|contains:
            - 'OneDrive'
            - 'GoogleDrive'
            - 'Dropbox'
            - 'Box'
        Details|contains:
            - 'false'
            - '0'
            - 'disabled'
    selection_credential_theft:
        EventID: 10  # Process access
        TargetImage|endswith:
            - '\OneDrive.exe'
            - '\GoogleDriveSync.exe'
            - '\Dropbox.exe'
        GrantedAccess: '0x1010'  # PROCESS_VM_READ
    condition: (selection_mass_deletion and selection_cloud_sync_paths) or
               (selection_sync_manipulation and selection_api_abuse) or
               (selection_powershell_destruction and selection_registry_manipulation) or selection_credential_theft
level: critical
tags:
    - attack.impact
    - attack.t1485
    - attack.t1070.004
    - attack.credential_access
    - attack.t1555
    - sysmon
    - windows
    - wiper
    - cloud_storage
    - onedrive
    - google_drive
    - dropbox
falsepositives:
    - Legitimate cloud storage maintenance and cleanup
    - User-initiated sync resets and account changes
    - Automated backup and archival processes

