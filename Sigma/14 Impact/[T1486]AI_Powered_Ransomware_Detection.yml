title: AI-Powered Ransomware with Adaptive Encryption
technique: T1486
id: 4c8a3f2e-5b1d-4e6f-9c2a-8d7e5f3a9b1c
status: experimental
description: >-
  Detects AI-powered ransomware using adaptive encryption. Monitors neural network loading and dynamic key generation.
author: Infinit3i
date: 2024-12-01
modified: 2026-04-27
references:
  - https://attack.mitre.org/techniques/T1486/
  - https://www.mitre.org/publications/systems-engineering-guide/
logsource:
  product: windows
  service: sysmon
detection:
  selection_ai_models:
  EventID:
  Image|endswith:
      - '\python.exe'
      - '\tensorflow.exe'
      - '\pytorch.exe'
  CommandLine|contains:
      - 'tensorflow'
      - 'pytorch'
      - 'sklearn'
      - 'neural_network'
      - 'deep_learning'
      - '.h5'
      - '.pb'
      - '.onnx'
  selection_encryption:
  EventID:
  TargetFilename|endswith:
      - '.locked'
      - '.encrypted'
      - '.ai_enc'
      - '.neural'
      - '.adaptive'
  selection_mass_file_ops:
  EventID:
  Image|contains:
      - 'encrypt'
      - 'cipher'
      - 'crypto'
  ProcessId:
  selection_adaptive_behavior:
  EventID:
  CommandLine|contains:
      - 'adaptive_encrypt'
      - 'ml_crypto'
      - 'neural_cipher'
      - 'ai_ransom'
      - 'smart_encrypt'
      - 'learning_crypto'
  selection_network_ml:
  EventID:
  DestinationPort:
      - 443
      - 8080
      - 9090
  Image|contains:
      - 'ml_'
      - 'ai_'
      - 'neural_'
  condition: |
    (selection_ai_models and selection_encryption) or (selection_mass_file_ops and selection_adaptive_behavior) or (selection_network_ml and selection_encryption)
level: critical
tags:
  - attack.impact
  - attack.t1486
  - windows
  - sysmon
  - attack.persistence
  - attack.t1543.003
  - ransomware
  - artificial_intelligence
  - machine_learning
falsepositives:
  - Legitimate machine learning development environments
  - Data science applications performing encryption
  - Automated backup tools with ML components
