title: Mass File Encryption Indicators
id: c3d4e5f6-7a8b-9c0d-1e2f-3a4b5c6d7e8f
status: experimental
description: Detects mass file encryption indicators through high-volume file modifications
author: Infinit3i
date: 2026/04/28
logsource:
  product: windows
  service: sysmon
detection:
  selection_file_mod:
    EventID: 1
    TargetFilename|endswith:
      - '.doc'
      - '.docx'
      - '.xls'
      - '.xlsx'
      - '.pdf'
      - '.jpg'
      - '.png'
      - '.txt'
  selection_suspicious_process:
    EventID: 1
    Image|contains:
      - '\AppData\Local\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
    CommandLine|contains:
      - '-enc '
      - 'crypto'
      - 'cipher'
      - 'aes'
      - 'rsa'
  selection_network_ransom:
    EventID: 1
    DestinationPort:
      - 443
      - 80
      - 9050
    Image|contains:
      - '\AppData\Local\Temp\'
      - '\ProgramData\'
  condition: selection_file_mod and (selection_suspicious_process or selection_network_ransom)
level: critical
tags:
  - attack.impact
  - attack.t1486
  - sysmon
  - windows
references:
  - https://attack.mitre.org/techniques/T1486/
falsepositives:
  - Legitimate encryption software
  - Backup operations
  - Antivirus scanning
