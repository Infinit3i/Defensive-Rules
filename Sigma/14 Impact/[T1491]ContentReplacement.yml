title: Suspicious Content Replacement Activities
id: 546c891c-feda-430d-9eb4-350f62156a5b
status: experimental
description: >-
  Detects content replacement and file overwriting through process execution targeting web content
author: Infinit3i
date: 2026/04/28
logsource:
  product: windows
  service: sysmon
detection:
  selection_process:
  EventID:
  CommandLine|contains:
      - 'echo'
      - 'copy'
      - 'move'
      - 'type'
      - 'index.html'
      - 'index.php'
      - 'default.asp'
      - 'home.html'
  selection_script:
  EventID:
  ParentProcessName|endswith:
      - 'cmd.exe'
      - 'powershell.exe'
      - 'wscript.exe'
      - 'cscript.exe'
  CommandLine|contains:
      - 'replace'
      - 'overwrite'
      - 'hacked'
      - 'defaced'
  condition: selection_process or selection_script
falsepositives:
  - Web development and deployment scripts
  - Content management system updates
  - Legitimate file maintenance
level: medium
tags:
  - attack.impact
  - attack.t1491
  - sysmon
  - windows
