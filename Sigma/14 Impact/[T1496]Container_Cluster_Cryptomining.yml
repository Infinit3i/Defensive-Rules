title: Container Cluster Compromise and Cryptocurrency Mining
technique: T1496
id: 9b4e6f2a-7c8d-3e5f-1a9b-4d6e8f2c5a7b
status: experimental
description: >-
  Detects container cluster compromise for cryptocurrency mining. Monitors unauthorized deployments and resource hijacking.
author: Infinit3i
date: 2024-12-01
modified: 2026-04-27
references:
  - https://attack.mitre.org/techniques/T1496/
  - https://attack.mitre.org/techniques/T1610/
logsource:
  product: linux
  service: auditd
detection:
  selection_container_tools:
  type:
  exe:
      - '/usr/bin/docker'
      - '/usr/bin/kubectl'
      - '/usr/bin/podman'
      - '/usr/bin/containerd'
  a0|contains:
      - 'run'
      - 'exec'
      - 'apply'
      - 'create'
  selection_mining_software:
  type:
  exe|endswith:
      - 'xmrig'
      - 'cpuminer'
      - 'cgminer'
      - 'bfgminer'
      - 'ethminer'
      - 'claymore'
      - 't-rex'
      - 'phoenixminer'
  a1|contains:
      - '--donate-level'
      - '--pool'
      - '--wallet'
      - '--algorithm'
      - '--cuda'
      - '--opencl'
  selection_container_images:
  type:
  a2|contains:
      - 'alpine/xmrig'
      - 'ubuntu/mining'
      - 'crypto/miner'
      - 'monero'
      - 'bitcoin'
      - 'ethereum'
      - 'mining'
  selection_kubernetes_deployments:
  type:
  exe:
  a1|contains:
      - 'apply'
      - 'create'
      - 'run'
  a3|contains:
      - 'deployment'
      - 'daemonset'
      - 'job'
      - 'cronjob'
  selection_resource_requests:
  type:
  a0|contains:
      - '--cpu='
      - '--memory='
      - '--gpus='
      - 'resources.requests'
      - 'resources.limits'
  selection_network_mining:
  type:
  syscall:
  success:
  condition: |
    (selection_container_tools and selection_mining_software) or
    (selection_kubernetes_deployments and selection_container_images) or
    (selection_container_tools and selection_resource_requests and selection_network_mining)
level: critical
tags:
  - attack.impact
  - attack.t1496
  - windows
  - sysmon
  - attack.resource_hijacking
  - attack.t1610
  - attack.deploy_container
  - auditd
  - linux
  - containers
  - kubernetes
  - docker
  - cryptocurrency
  - mining
falsepositives:
  - Legitimate cryptocurrency mining in authorized environments
  - Performance testing and benchmarking tools
  - Resource monitoring and stress testing applications
