title: SaaS Data Destruction and Exfiltration
technique: T1485
id: 5d8e2f3a-9b6c-4e7f-2a5d-8e3f6b9c4a7e
status: experimental
description: >-
  Detects malicious data destruction and exfiltration in SaaS platforms through API abuse and bulk operations.
author: Infinit3i
date: 2024-12-01
modified: 2026-04-27
references:
  - https://attack.mitre.org/techniques/T1485/
  - https://attack.mitre.org/techniques/T1567/
logsource:
  product: windows
  service: powershell
detection:
  selection_o365_destruction:
    EventID:
    ScriptBlockText|contains:
      - 'Remove-Mailbox'
      - 'Remove-MailboxFolder'
      - 'Remove-UnifiedGroup'
      - 'Remove-SPOSite'
      - 'Remove-PnPFile'
      - 'Clear-RecycleBin'
      - 'Remove-AzureADUser'
      - 'Remove-MgUser'
  selection_google_workspace:
    EventID:
    ScriptBlockText|contains:
      - 'gam delete'
      - 'gam remove'
      - 'gsuite delete'
      - 'google-api-python-client'
      - 'drive.files().delete'
      - 'gmail.users().messages().delete'
  selection_salesforce_api:
    EventID:
    ScriptBlockText|contains:
      - 'sfdx force:data:record:delete'
      - 'sf data delete'
      - 'salesforce api delete'
      - 'DELETE /services/data/'
  selection_bulk_operations:
    EventID:
    ScriptBlockText|contains:
      - 'Invoke-RestMethod'
      - 'Invoke-WebRequest'
      - 'HttpClient'
      - 'WebClient'
    ScriptBlockText|regex:
      - '.*delete.*\d{2,}.*'  # delete with numbers (bulk)
      - '.*remove.*\d{2,}.*'  # remove with numbers (bulk)
  selection_exfiltration:
    EventID:
    ScriptBlockText|contains:
      - 'Export-Mailbox'
      - 'Export-PST'
      - 'Get-Mailbox | ForEach'
      - 'Get-SPOFile'
      - 'Download-File'
      - 'Copy-Item'
  selection_api_tools:
    EventID:
    Image|endswith:
      - '\powershell.exe'
      - '\python.exe'
      - '\curl.exe'
      - '\wget.exe'
    CommandLine|contains:
      - 'api'
      - 'rest'
      - 'graph.microsoft.com'
      - 'googleapis.com'
      - 'salesforce.com'
  selection_network_activity:
    EventID:
    DestinationHostname|contains:
      - 'graph.microsoft.com'
      - 'outlook.office365.com'
      - 'googleapis.com'
      - 'salesforce.com'
      - 'dropbox.com'
      - 'box.com'
    DestinationPort:
  condition: |
    (selection_o365_destruction or selection_google_workspace or selection_salesforce_api) and
    selection_bulk_operations or (selection_exfiltration and selection_api_tools and selection_network_activity)
level: critical
tags:
  - attack.impact
  - attack.t1485
  - windows
  - sysmon
  - attack.exfiltration
  - attack.t1567
  - attack.t1567.002
  - powershell
  - saas
  - office365
  - google_workspace
  - salesforce
  - data_destruction
falsepositives:
  - Legitimate bulk data management operations
  - Automated backup and archival processes
  - Administrative cleanup and maintenance tasks
