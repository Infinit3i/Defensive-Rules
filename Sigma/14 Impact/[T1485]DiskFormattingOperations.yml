title: Disk Formatting and Volume Destruction
id: a7b8c9d0-1e2f-3a4b-5c6d-7e8f9a0b1c2d
status: experimental
description: >-
  Detects disk formatting operations through format commands and volume destruction
author: Infinit3i
date: 2026/04/28
logsource:
  product: windows
  service: sysmon
detection:
  selection_format:
  EventID:
  Image|endswith:
      - '\format.com'
      - '\diskpart.exe'
      - '\powershell.exe'
  CommandLine|contains:
      - 'format /q /x'
      - 'format c: /q'
      - 'select disk'
      - 'clean all'
      - 'delete volume'
      - 'Clear-Disk -RemoveData'
  selection_wipe:
  EventID:
  Image|endswith:
      - '\sdelete.exe'
      - '\cipher.exe'
  CommandLine|contains:
      - 'sdelete -z'
      - 'cipher /w:'
      - '-p 3'
      - '-s -z'
  condition: selection_format or selection_wipe
level: critical
tags:
  - attack.impact
  - attack.t1485
  - sysmon
  - windows
references:
  - https://attack.mitre.org/techniques/T1485/
falsepositives:
  - Legitimate disk maintenance
  - System preparation
  - Secure data wiping procedures
