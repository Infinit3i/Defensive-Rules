title: IoT Botnet Recruitment and DDoS Amplification
technique: T1499
id: 2f7e9a4b-8c5d-6e3f-4a2f-7e9a5c8d6b3f
status: experimental
description: >-
  Detects IoT device recruitment into botnets and DDoS amplification attacks targeting DNS, NTP, SSDP, and other UDP-based services for traffic amplification and infrastructure disruption.
author: Infinit3i
date: 2024-12-01
modified: 2026-04-27
references:
  - https://attack.mitre.org/techniques/T1499/
  - https://attack.mitre.org/techniques/T1499.004/
logsource:
  product: zeek
  service: conn
detection:
  selection_iot_scanning:
    proto:
    service:
    conn_state:
    resp_h|contains:
      - '192.168.'
      - '10.'
      - '172.16.'
    orig_bytes:
    duration:
  selection_telnet_bruteforce:
    proto:
    id.resp_p:
    conn_state:
      - 'SF'
      - 'REJ'
    duration:
  selection_mirai_payloads:
    proto:
    id.resp_p:
      - 22
      - 23
      - 2323
      - 8080
      - 8888
    history|contains:
      - 'Sh'  # Successful connection
    orig_bytes:
    resp_bytes:
  selection_amplification_dns:
    proto:
    id.resp_p:
    query_type:
    orig_bytes:
    resp_bytes:
  selection_amplification_ntp:
    proto:
    id.resp_p:
    orig_bytes:
    resp_bytes:
  selection_amplification_ssdp:
    proto:
    id.resp_p:
    orig_bytes:
    resp_bytes:
  selection_mass_targeting:
    proto:
      - 'tcp'
      - 'udp'
    orig_h:
    missed_bytes:
    local_orig:
    local_resp:
  condition: |
    (selection_iot_scanning or selection_telnet_bruteforce or selection_mirai_payloads) or
    (selection_amplification_dns or selection_amplification_ntp or selection_amplification_ssdp) and selection_mass_targeting
level: critical
tags:
  - attack.impact
  - attack.t1499
  - windows
  - sysmon
  - attack.t1499.004
  - attack.resource_hijacking
  - attack.t1496
  - zeek
  - network
  - iot
  - botnet
  - ddos
  - amplification
  - mirai
falsepositives:
  - Legitimate network scanning and monitoring tools
  - DNS resolution spikes during normal operations
  - NTP synchronization bursts in large networks
