title: Ransomware Encryption Activity
id: b9c0d1e2-4f5a-6b7c-8d9e-0f1a2b3c4d5e
status: experimental
description: >-
  Detects ransomware encryption activity through file extension changes and crypto processes
author: Infinit3i
date: 2026/04/28
logsource:
  product: windows
  service: sysmon
detection:
  selection_encrypt_ext:
    EventID: 1
    TargetFilename|endswith:
      - '.locked'
      - '.encrypted'
      - '.crypto'
      - '.crypt'
      - '.vault'
      - '.onion'
      - '.wcry'
      - '.wncry'
  selection_ransom_note:
    EventID: 1
    TargetFilename|contains:
      - 'README'
      - 'DECRYPT'
      - 'RECOVERY'
      - 'HELP_DECRYPT'
    TargetFilename|endswith:
      - '.txt'
      - '.html'
      - '.htm'
  selection_crypto_process:
    EventID: 1
    Image|endswith:
      - '\bcdedit.exe'
      - '\vssadmin.exe'
    CommandLine|contains:
      - 'delete shadows'
      - 'set recoveryenabled no'
      - 'set bootstatuspolicy ignoreallfailures'
  condition: selection_encrypt_ext or selection_ransom_note or selection_crypto_process
level: critical
tags:
  - attack.impact
  - attack.t1486
  - sysmon
  - windows
references:
  - https://attack.mitre.org/techniques/T1486/
falsepositives:
  - Legitimate backup encryption
  - Security software operations
