title: Named Pipe Impersonation for Token Theft
technique: T1134.005
id: 8f9a0b1c-2d3e-4567-8901-23456789abcd
status: experimental
description: Detects named pipe impersonation attacks for token theft
author: Infinit3i
date: 2024/04/27
references:
    - https://attack.mitre.org/techniques/T1134/005/
logsource:
    product: windows
    service: sysmon
detection:
    selection_pipe_create:
        EventID: 17
        PipeName|startswith:
            - '\pipe\token'
            - '\pipe\impersonate'
            - '\pipe\privesc'
    selection_pipe_connect:
        EventID: 18
        PipeName|contains:
            - 'pipe'
        Image|endswith:
            - '.exe'
    selection_api_call:
        EventID: 10
        CallTrace|contains:
            - 'ImpersonateNamedPipeClient'
            - 'GetNamedPipeClientComputerName'
    condition: selection_pipe_create or (selection_pipe_connect and
               selection_api_call)
falsepositives:
    - Legitimate inter-process communication
    - System services
level: medium
tags:
  # MITRE ATT&CK tactic
  - attack.privilege_escalation
  # MITRE ATT&CK technique
  - attack.t1134.005
  # Platform/tool tags
  - windows
  - sysmon
  - attack.privilege_escalation
  - attack.t1134.005
  - attack.lateral_movement
  - sysmon
  - windows
