title: Create Process with Token for Privilege Escalation
technique: T1134.002
id: 9a0b1c2d-3e4f-5678-9012-3456789abcde
status: experimental
description: Detects process creation with stolen or duplicated tokens
author: Infinit3i
date: 2024/04/27
references:
    - https://attack.mitre.org/techniques/T1134/002/
logsource:
    product: windows
    service: sysmon
detection:
    selection_api_call:
        EventID: 10
        CallTrace|contains:
            - 'CreateProcessWithTokenW'
            - 'CreateProcessAsUserW'
            - 'DuplicateTokenEx'
    selection_process:
        EventID: 1
        LogonId: '0x3e7'
        IntegrityLevel: 'System'
        ParentImage|endswith:
            - '.exe'
    selection_token_access:
        EventID: 10
        TargetImage|endswith:
            - '\lsass.exe'
            - '\winlogon.exe'
        GrantedAccess: '0x1400'
    condition: selection_api_call and (selection_process or
               selection_token_access)
falsepositives:
    - Legitimate service processes
    - System authentication
level: medium
tags:
  # MITRE ATT&CK tactic
  - attack.privilege_escalation
  # MITRE ATT&CK technique
  - attack.t1134.002
  # Platform/tool tags
  - windows
  - sysmon
  - attack.privilege_escalation
  - attack.t1134.002
  - sysmon
  - windows
