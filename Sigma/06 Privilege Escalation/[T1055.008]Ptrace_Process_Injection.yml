title: Ptrace Process Injection for Privilege Escalation
technique: T1055.008
id: 4f5a6b7c-8d9e-0123-4567-890123456789
status: experimental
description: Detects ptrace system call abuse for process injection
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1055/008/
logsource:
  product: linux
  service: auditd
detection:
  selection_ptrace:
  type:
  syscall:
  success:
  selection_attach:
  a0:
  a1:
  selection_suspicious:
  comm:
  ppid:
  selection_injection:
  syscall:
  a0|contains:
      - '0x4'
      - '0x5'
      - '0x6'
  condition: selection_ptrace and (selection_attach or selection_injection) and not selection_suspicious
falsepositives:
  - Legitimate debugging sessions
  - System monitoring tools
level: medium
tags:
  - attack.privilege_escalation
  - attack.t1055.008
  - windows
  - sysmon
  - attack.defense_evasion
  - auditd
  - linux
