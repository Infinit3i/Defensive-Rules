title: Ptrace Process Injection for Privilege Escalation
technique: T1055.008
id: 4f5a6b7c-8d9e-0123-4567-890123456789
status: experimental
description: Detects ptrace system call abuse for process injection
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1055/008/
logsource:
  product: linux
  service: auditd
detection:
  selection_ptrace:
    type: 'SYSCALL'
    syscall: 'ptrace'
    success: 'yes'
  selection_attach:
    a0: '0x10'
    a1: '!= 0'
  selection_suspicious:
    comm: 'gdb'
    ppid: '!= 1'
  selection_injection:
    syscall: 'ptrace'
    a0|contains:
      - '0x4'
      - '0x5'
      - '0x6'
  condition: selection_ptrace and (selection_attach or selection_injection)
               and not selection_suspicious
falsepositives:
  - Legitimate debugging sessions
  - System monitoring tools
level: medium
tags:
  # MITRE ATT&CK tactic
  - attack.privilege_escalation
  # MITRE ATT&CK technique
  - attack.t1055.008
  # Platform/tool tags
  - windows
  - sysmon
  - attack.privilege_escalation
  - attack.t1055.008
  - attack.defense_evasion
  - auditd
  - linux
