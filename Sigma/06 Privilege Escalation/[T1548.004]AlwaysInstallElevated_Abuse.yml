title: AlwaysInstallElevated Registry Setting Abuse
technique: T1548.004
id: 7b8c9d0e-1f2a-3456-7890-123456789abc
status: experimental
description: Detects abuse of AlwaysInstallElevated for privilege escalation
author: Infinit3i
date: 2024/04/27
references:
    - https://attack.mitre.org/techniques/T1548/004/
logsource:
    product: windows
    service: sysmon
detection:
    selection_registry:
        EventID: 13
        TargetObject|contains:
            - 'AlwaysInstallElevated'
        Details: 'DWORD (0x00000001)'
    selection_msiexec:
        EventID: 1
        Image|endswith: '\msiexec.exe'
        CommandLine|contains:
            - '/i'
            - '/package'
        IntegrityLevel: 'High'
    condition: selection_registry or selection_msiexec
falsepositives:
    - Legitimate software installations
    - Administrative package deployments
level: high
tags:
    # MITRE ATT&CK tactic
    - attack.privilege_escalation
    # MITRE ATT&CK technique
    - attack.t1548.004
    # Platform/tool tags
    - windows
    - sysmon
    - attack.privilege_escalation
    - attack.t1548.004
    - sysmon
    - windows