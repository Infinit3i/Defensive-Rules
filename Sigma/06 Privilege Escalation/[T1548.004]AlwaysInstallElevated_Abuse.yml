title: AlwaysInstallElevated Registry Setting Abuse
technique: T1548.004
id: 7b8c9d0e-1f2a-3456-7890-123456789abc
status: experimental
description: Detects abuse of AlwaysInstallElevated for privilege escalation
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1548/004/
logsource:
  product: windows
  service: sysmon
detection:
  selection_registry:
    EventID: 1
    TargetObject|contains:
      - 'AlwaysInstallElevated'
    Details:
  selection_msiexec:
    EventID: 1
    Image|endswith:
    CommandLine|contains:
      - '/i'
      - '/package'
    IntegrityLevel:
  condition: selection_registry or selection_msiexec
falsepositives:
  - Legitimate software installations
  - Administrative package deployments
level: high
tags:
  - attack.privilege_escalation
  - attack.t1548.004
  - windows
  - sysmon
