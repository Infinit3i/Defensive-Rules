title: WMI Process Creation for Privilege Escalation
id: 8d9e0f1a-2b3c-4567-890a-bcdef1234567
status: experimental
description: Detects WMI process creation with elevated privileges
author: SOC Team
date: 2024/04/27
references:
    - https://attack.mitre.org/techniques/T1047/
logsource:
    product: windows
    service: sysmon
detection:
    selection_wmi:
        EventID: 1
        ParentImage|endswith:
            - '\wmiprvse.exe'
            - '\wmiapsrv.exe'
        CommandLine|contains:
            - 'cmd.exe'
            - 'powershell.exe'
            - 'net user'
            - 'net localgroup'
    selection_wmic:
        EventID: 1
        Image|endswith: '\wmic.exe'
        CommandLine|contains:
            - 'process call create'
            - 'service'
            - '/privileged'
    condition: selection_wmi or selection_wmic
falsepositives:
    - Legitimate system administration
    - WMI-based monitoring tools
level: medium
tags:
    - attack.privilege_escalation
    - attack.t1047
    - attack.execution
    - sysmon
    - windows