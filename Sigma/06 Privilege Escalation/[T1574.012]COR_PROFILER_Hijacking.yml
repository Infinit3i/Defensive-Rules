title: COR PROFILER DLL Hijacking Detection
technique: T1574.012
id: 8c9d0e1f-2a3b-4567-8901-234567890123
status: experimental
description: Detects .NET COR_PROFILER environment variable DLL hijacking
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1574/012/
logsource:
  product: windows
  service: sysmon
detection:
  selection_registry:
  EventID:
  TargetObject|contains:
      - 'COR_PROFILER'
      - 'COR_PROFILER_PATH'
  selection_environment:
  EventID:
  CommandLine|contains:
      - 'COR_ENABLE_PROFILING=1'
      - 'COR_PROFILER='
      - 'COR_PROFILER_PATH='
  selection_dotnet:
  EventID:
  Image|contains:
  ImageLoaded|endswith:
  Signed:
  condition: selection_registry or selection_environment or selection_dotnet
falsepositives:
  - Legitimate .NET profiling tools
  - Development environments
level: medium
tags:
  - attack.privilege_escalation
  - attack.t1574.012
  - windows
  - sysmon
  - attack.defense_evasion
