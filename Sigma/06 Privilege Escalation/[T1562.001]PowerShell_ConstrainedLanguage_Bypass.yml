title: PowerShell Constrained Language Mode Bypass
technique: T1562.001
id: 3e4f5a6b-7c8d-9012-3456-789abcdef012
status: experimental
description: Detects PowerShell constrained language mode bypass attempts
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1562/001/
logsource:
  product: windows
  service: powershell
detection:
  selection_clm:
  EventID:
  ScriptBlockText|contains:
      - '$ExecutionContext.SessionState.LanguageMode'
      - 'ConstrainedLanguage'
      - 'FullLanguage'
  selection_bypass:
  EventID:
  ScriptBlockText|contains:
      - 'powershell.exe -version 2'
      - 'Add-Type'
      - 'reflection.assembly'
      - '$env:PSModulePath'
  condition: selection_clm or selection_bypass
falsepositives:
  - Legitimate PowerShell administration
  - Security testing
level: high
tags:
  - attack.privilege_escalation
  - attack.t1562.001
  - windows
  - sysmon
  - attack.defense_evasion
  - powershell
