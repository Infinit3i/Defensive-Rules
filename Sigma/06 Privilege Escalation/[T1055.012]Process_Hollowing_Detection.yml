title: Process Hollowing for Privilege Escalation
technique: T1055.012
id: 9e0f1a2b-3c4d-5678-9012-3456789abcde
status: experimental
description: Detects process hollowing techniques used for privilege escalation
author: Infinit3i
date: 2024/04/27
references:
    - https://attack.mitre.org/techniques/T1055/012/
logsource:
    product: windows
    service: sysmon
detection:
    selection_process:
        EventID: 1
        Image|endswith:
            - '\svchost.exe'
            - '\rundll32.exe'
            - '\dllhost.exe'
        CommandLine: ''
    selection_memory:
        EventID: 10
        CallTrace|contains:
            - 'NtUnmapViewOfSection'
            - 'ZwUnmapViewOfSection'
            - 'VirtualAllocEx'
    selection_thread:
        EventID: 8
        StartModule: ''
    condition: selection_process and (selection_memory or selection_thread)
falsepositives:
    - Legitimate system processes
    - Security software
level: high
tags:
  # MITRE ATT&CK tactic
  - attack.privilege_escalation
  # MITRE ATT&CK technique
  - attack.t1055.012
  # Platform/tool tags
  - windows
  - sysmon
  - attack.privilege_escalation
  - attack.t1055.012
  - attack.defense_evasion
  - sysmon
  - windows
