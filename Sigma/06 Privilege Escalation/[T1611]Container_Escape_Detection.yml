title: Container Escape Attempt Detection
technique: T1611
id: 4f5a6b7c-8d9e-0123-4567-89abcdef0123
status: experimental
description: Detects container escape attempts through privileged operations
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1611/
logsource:
  product: linux
  service: auditd
detection:
  selection_mount:
    type: 'SYSCALL'
    syscall: 'mount'
    a0|contains:
      - '/proc'
      - '/sys'
      - '/dev'
  selection_chroot:
    type: 'SYSCALL'
    syscall:
      - 'chroot'
      - 'pivot_root'
  selection_capabilities:
    type: 'SYSCALL'
    syscall: 'capset'
    success: 'yes'
  condition: selection_mount or selection_chroot or selection_capabilities
falsepositives:
  - Legitimate container operations
  - System maintenance
level: high
tags:
  # MITRE ATT&CK tactic
  - attack.privilege_escalation
  # MITRE ATT&CK technique
  - attack.t1611
  # Platform/tool tags
  - windows
  - sysmon
  - attack.privilege_escalation
  - attack.t1611
  - auditd
  - linux
  - container
