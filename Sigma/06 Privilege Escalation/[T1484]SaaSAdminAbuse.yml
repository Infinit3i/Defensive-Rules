title: SaaS Administrator Privilege Abuse
id: e5f6a7b8-9012-3456-789d-ef0123456789
status: experimental
description: Detects suspicious administrative activities in SaaS platforms indicating privilege abuse
author: Infinit3i
date: 2026/04/27
tags:
  - attack.privilege_escalation
  - attack.t1484
  - saas_admin
  - cloud
logsource:
  product: saas_platform
  service: admin
detection:
  selection_admin_action:
    event_type:
      - 'user_created'
      - 'user_deleted'
      - 'role_assigned'
      - 'permission_granted'
  selection_suspicious_timing:
    timestamp|timeofday:
      - '00:00-06:00'
      - '22:00-23:59'
  selection_bulk_ops:
    event_type:
      - 'user_created'
      - 'user_deleted'
  condition: selection_admin_action and (selection_suspicious_timing or selection_bulk_ops)
  timeframe: 10m
  count: 5
level: high
fields:
  - admin_user
  - target_user
  - event_type
  - timestamp
  - ip_address
falsepositives:
  - Scheduled maintenance activities
  - Bulk user provisioning processes
references:
  - https://attack.mitre.org/techniques/T1484/
technique: T1484
