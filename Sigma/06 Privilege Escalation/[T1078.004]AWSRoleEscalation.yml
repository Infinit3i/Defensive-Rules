title: AWS IAM Role Escalation
id: b2c3d4e5-f6a7-8901-2345-678901234567
status: experimental
description: Detects privilege escalation through AWS IAM role assumptions
author: Infinit3i
date: 2026/04/28
tags:
  - attack.privilege_escalation
  - attack.t1078.004
  - aws
  - iam
logsource:
  product: aws
  service: cloudtrail
detection:
  selection_assume_role:
    eventName: AssumeRole
    sourceIPAddress|startswith:
      - '10.'
      - '192.168.'
      - '172.'
  selection_admin_roles:
    responseElements.assumedRoleUser.arn|contains:
      - 'Administrator'
      - 'PowerUser'
      - 'FullAccess'
      - 'root'
  selection_cross_account:
    eventName: AssumeRole
    recipientAccountId: '*'
    userIdentity.accountId: '*'
  condition: selection_assume_role and (selection_admin_roles or selection_cross_account)
  timeframe: 10m
  count: 5
level: medium
fields:
  - userIdentity.arn
  - sourceIPAddress
  - responseElements.assumedRoleUser.arn
  - recipientAccountId
falsepositives:
  - Legitimate role assumptions
  - Cross-account access patterns
  - Automated services
references:
  - https://attack.mitre.org/techniques/T1078/004/
technique: T1078.004
