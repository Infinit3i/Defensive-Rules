title: UAC Bypass via CMSTP Connection Manager
technique: T1548.002
id: 0e1f2a3b-4c5d-6789-0123-456789abcdef
status: experimental
description: Detects UAC bypass using CMSTP.exe connection manager profiles
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1548/002/
logsource:
  product: windows
  service: sysmon
detection:
  selection_cmstp:
  EventID:
  Image|endswith:
  CommandLine|contains:
      - '/au'
      - '/s'
  selection_inf_file:
  EventID:
  TargetFilename|endswith:
  TargetFilename|contains:
      - '\Temp\'
      - '\AppData\'
  selection_registry:
  EventID:
  TargetObject|contains:
    condition: selection_cmstp and (selection_inf_file or selection_registry)
falsepositives:
  - Legitimate VPN connection setups
  - Network profile installations
level: medium
tags:
  - attack.privilege_escalation
  - attack.t1548.002
  - windows
  - sysmon
  - attack.defense_evasion
