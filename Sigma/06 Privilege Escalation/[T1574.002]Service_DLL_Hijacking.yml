title: Windows Service DLL Hijacking Detection
id: 5e6f7a8b-9c0d-1e2f-3456-789abcdef012
status: experimental
description: Detects DLL hijacking targeting Windows service executables
author: SOC Team
date: 2024/04/27
references:
    - https://attack.mitre.org/techniques/T1574/002/
logsource:
    product: windows
    service: sysmon
detection:
    selection_file:
        EventID: 11
        TargetFilename|contains: '\System32\'
        TargetFilename|endswith:
            - '.dll'
    selection_load:
        EventID: 7
        ImageLoaded|contains: '\System32\'
        ImageLoaded|endswith: '.dll'
        Signed: 'false'
    selection_process:
        EventID: 1
        Image|contains: '\System32\'
        ParentImage|endswith: '\services.exe'
    condition: (selection_file or selection_load) and selection_process
falsepositives:
    - Legitimate third-party services
    - Software updates
level: high
tags:
    - attack.privilege_escalation
    - attack.t1574.002
    - attack.persistence
    - sysmon
    - windows