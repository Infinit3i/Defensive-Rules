title: Windows Service DLL Hijacking Detection
technique: T1574.002
id: 5e6f7a8b-9c0d-1e2f-3456-789abcdef012
status: experimental
description: Detects DLL hijacking targeting Windows service executables
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1574/002/
logsource:
  product: windows
  service: sysmon
detection:
  selection_file:
  EventID:
  TargetFilename|contains:
  TargetFilename|endswith:
      - '.dll'
  selection_load:
  EventID:
  ImageLoaded|contains:
  ImageLoaded|endswith:
  Signed:
  selection_process:
  EventID:
  Image|contains:
  ParentImage|endswith:
    condition: (selection_file or selection_load) and selection_process
falsepositives:
  - Legitimate third-party services
  - Software updates
level: high
tags:
  - attack.privilege_escalation
  - attack.t1574.002
  - windows
  - sysmon
  - attack.persistence
