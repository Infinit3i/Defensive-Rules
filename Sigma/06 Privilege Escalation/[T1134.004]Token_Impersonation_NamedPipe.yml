title: Token Impersonation via Named Pipe Client
technique: T1134.004
id: 2c3d4e5f-6a7b-8c9d-0e1f-2345678901ab
status: experimental
description: Detects token impersonation through named pipe client connections
author: Infinit3i
date: 2024/04/27
references:
  - https://attack.mitre.org/techniques/T1134/004/
logsource:
  product: windows
  service: sysmon
detection:
  selection_pipe:
  EventID:
  PipeName|startswith:
      - '\pipe\spoolss'
      - '\pipe\samr'
      - '\pipe\lsarpc'
      - '\pipe\netlogon'
  selection_process:
  EventID:
  CommandLine|contains:
      - 'ImpersonateNamedPipeClient'
      - 'CreateNamedPipe'
  Image|endswith:
      - '.exe'
  condition: selection_pipe or selection_process
falsepositives:
  - Legitimate system services
  - Print spooler operations
level: medium
tags:
  - attack.privilege_escalation
  - attack.t1134.004
  - windows
  - sysmon
  - attack.lateral_movement
