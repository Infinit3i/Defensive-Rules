logsource:
  product: windows
  category: process_creation
detection:
  selection:
  CommandLine|contains:
      - "psexec"
      - "winrs"
      - "wmic /node:"
      - "wmiexec"
  condition: selection
falsepositives:
  - Legitimate remote administration activity by system or network administrators.
