---
title: Account Impersonation Detection
technique: T1656
id: c7f4e9a6-9d8b-4e3f-c7f4-9e6a9d8b3c7b
status: experimental
description: >-
  >- Detects account impersonation attempts by monitoring for suspicious logon activities, unusual user behavior patterns, or authentication events that may indicate an attacker impersonating
  legitimate users.
references:
  - https://attack.mitre.org/techniques/T1656/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1656
  - windows
  - sysmon
  - impersonation
  - account_takeover
  - authentication
logsource:
  product: windows
  service: security
detection:
  unusual_logon:
    EventID:
    LogonType:
      - 2
      - 3
      - 10
  geographic_anomaly:
    IpAddress|startswith:
      - '192.168.'
      - '10.'
    WorkstationName|contains:
  service_impersonation:
    EventID:
    TargetUserName|contains:
      - 'admin'
      - 'service'
      - 'system'
  condition: unusual_logon and (geographic_anomaly or service_impersonation)
falsepositives:
  - Legitimate remote access
  - Service account operations
level: medium
