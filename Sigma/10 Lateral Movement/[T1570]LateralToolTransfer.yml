title: Lateral Tool Transfer Detection
id: a7b8c9d0-e1f2-3456-0123-789012345678
status: experimental
description: Detects transfer of tools between compromised hosts for lateral movement
author: Infinit3i
date: 2026/04/28
tags:
  - attack.lateral_movement
  - attack.t1570
  - file_transfer
  - network
logsource:
  product: windows
  service: sysmon
detection:
  selection_file_creation:
  EventID:
  TargetFilename|contains:
      - '\Windows\Temp\'
      - '\ProgramData\'
      - '\Users\Public\'
  TargetFilename|endswith:
      - '.exe'
      - '.dll'
      - '.bat'
      - '.ps1'
      - '.vbs'
  selection_network_transfer:
  EventID:
  Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\bitsadmin.exe'
      - '\certutil.exe'
  DestinationPort:
      - 80
      - 443
      - 21
      - 22
  selection_copy_tools:
  EventID:
  Image|endswith:
  CommandLine|contains:
      - '\\*\'
      - '/s'
      - '/e'
  condition: selection_file_creation or selection_network_transfer or selection_copy_tools
level: medium
fields:
  - Image
  - TargetFilename
  - CommandLine
  - DestinationIp
  - User
falsepositives:
  - Legitimate software deployment
  - Administrative file transfers
  - Backup operations
references:
  - https://attack.mitre.org/techniques/T1570/
technique: T1570
