title: SSH Lateral Movement Detection
id: d4e5f6a7-b8c9-0123-def0-456789012345
status: experimental
description: Detects lateral movement via SSH connections between internal hosts
author: Infinit3i
date: 2026/04/28
tags:
  - attack.lateral_movement
  - attack.t1021.004
  - ssh
  - linux
logsource:
  product: linux
  service: syslog
detection:
  selection_ssh_login:
    program: sshd
    message|contains:
      - 'Accepted password'
      - 'Accepted publickey'
      - 'session opened'
  selection_internal_ssh:
    src_ip|startswith:
      - '10.'
      - '172.'
      - '192.168.'
  selection_rapid_connections:
    program: sshd
    message|contains: 'Connection from'
  condition: selection_ssh_login and selection_internal_ssh
  timeframe: 5m
  count: 5
level: medium
fields:
  - user
  - src_ip
  - dst_ip
  - program
  - message
falsepositives:
  - Legitimate SSH administrative access
  - Automated deployment scripts
  - System monitoring connections
references:
  - https://attack.mitre.org/techniques/T1021/004/
technique: T1021.004