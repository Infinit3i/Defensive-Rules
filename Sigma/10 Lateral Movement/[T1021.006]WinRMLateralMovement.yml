title: WinRM Lateral Movement Detection
id: f6a7b8c9-d0e1-2345-f012-678901234567
status: experimental
description: Detects lateral movement via Windows Remote Management (WinRM)
author: Infinit3i
date: 2026/04/28
tags:
  - attack.lateral_movement
  - attack.t1021.006
  - winrm
  - powershell
logsource:
  product: windows
  service: winrm
detection:
  selection_winrm_connection:
  EventID:
  SourceName:
  selection_powershell_remoting:
  EventID:
  Channel:
  Message|contains:
      - 'Enter-PSSession'
      - 'Invoke-Command'
      - 'New-PSSession'
  selection_winrs_execution:
  EventID:
  Image|endswith:
  CommandLine|contains:
  selection_network_logon:
  EventID:
  LogonType:
  ProcessName:
  condition: |
    selection_winrm_connection or selection_powershell_remoting or selection_winrs_execution or selection_network_logon
level: medium
fields:
  - TargetUserName
  - IpAddress
  - CommandLine
  - Message
  - ProcessName
falsepositives:
  - Legitimate PowerShell remoting
  - Authorized remote administration
  - Configuration management tools
references:
  - https://attack.mitre.org/techniques/T1021/006/
technique: T1021.006
