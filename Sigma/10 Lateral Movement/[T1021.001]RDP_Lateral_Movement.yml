---
title: RDP Lateral Movement Detection
technique: T1021.001
id: b6f2e9d4-8c7a-4e3f-a1b5-9e2f8d7c4a6b
status: experimental
description: >-
  >- Detects lateral movement via RDP by monitoring for RDP connections between internal hosts, suspicious RDP logon patterns, or unauthorized remote desktop access that may indicate attacker
  movement through the network.
references:
  - https://attack.mitre.org/techniques/T1021/001/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1021.001
  - windows
  - sysmon
  - rdp
  - remote_desktop
logsource:
  product: windows
  service: security
detection:
  rdp_logon:
    EventID:
    LogonType:
    AuthenticationPackageName:
  internal_source:
    IpAddress|startswith:
      - '10.'
      - '172.'
      - '192.168.'
  unusual_account:
    TargetUserName|contains:
      - 'admin'
      - 'service'
      - 'test'
  condition: rdp_logon and internal_source and unusual_account
falsepositives:
  - Legitimate administrative remote access
  - Authorized IT support activities
level: medium
