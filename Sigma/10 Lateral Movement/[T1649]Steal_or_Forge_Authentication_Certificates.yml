---
title: Authentication Certificate Theft or Forgery
technique: T1649
id: a8f5c9e4-7b2d-4e6f-a8f5-9c4e7b2d6a8b
status: experimental
description: >-
  >- Detects theft or forgery of authentication certificates by monitoring for suspicious certificate operations, unauthorized certificate access, or certificate abuse that may be used for
  lateral movement.
references:
  - https://attack.mitre.org/techniques/T1649/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1649
  - windows
  - sysmon
  - attack.credential_access
  - certificates
  - authentication
logsource:
  product: windows
  service: security
detection:
  cert_access:
    EventID:
    SubjectUserName|contains:
      - 'admin'
      - 'service'
  cert_export:
    EventID:
    KeyName|contains:
      - 'Certificate'
      - 'Private Key'
  cert_install:
    EventID:
    CertificateSubjectName|contains:
      - 'CN='
      - 'O='
  condition: cert_access or cert_export or cert_install
falsepositives:
  - Legitimate certificate management
  - PKI operations
level: medium
