---
title: Data Access from Network Shared Drives
technique: T1039
id: f3a7e9c5-8b6d-4e2f-f3a7-9e5c8b6d2f3b
status: experimental
description: >-
  >- Detects suspicious data access from network shared drives by monitoring for unusual file access patterns, bulk data retrieval, or unauthorized access to sensitive shared resources during lateral movement.
references:
  - https://attack.mitre.org/techniques/T1039/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1039
  - windows
  - sysmon
  - attack.collection
  - network_shares
  - data_access
logsource:
  product: windows
  service: security
detection:
  share_access:
    EventID:
    ShareName|endswith:
      - '$'
      - 'SHARE'
      - 'DATA'
    bulk_access:
    EventID:
    AccessMask:
    RelativeTargetName|count|gte:
    sensitive_files:
    EventID:
    RelativeTargetName|endswith:
      - '.xlsx'
      - '.docx'
      - '.pdf'
      - '.txt'
  condition: share_access and (bulk_access or sensitive_files)
falsepositives:
  - Legitimate file server access
  - Backup operations
level: low
