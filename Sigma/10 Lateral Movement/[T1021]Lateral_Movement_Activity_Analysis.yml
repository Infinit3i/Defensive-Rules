---
title: Lateral Movement Activity Analysis
technique: T1021
id: e123fa45-6789-4dce-91ab-abcdef987654
status: experimental
description: >-
  > "Detects potential lateral movement by identifying unexpected internal connections using protocols such as RDP, SMB, SSH, and WinRM. This rule uses Zeek conn logs to analyze host-to-host
  activity across the internal network."
references:
  - https://attack.mitre.org/techniques/T1021/
author: Infinit3i
date: 2025-04-08
tags:
  - attack.lateral_movement
  - attack.t1021
  - windows
  - sysmon
logsource:
  product: zeek
  service: conn
detection:
  selection:
    service|contains:
      - "smb"
      - "rdp"
      - "ssh"
      - "winrm"
    id_orig_h|startswith:
    id_resp_h|startswith:
  condition: selection
falsepositives:
  - Normal administrative operations or backups using remote management protocols.
level: high
