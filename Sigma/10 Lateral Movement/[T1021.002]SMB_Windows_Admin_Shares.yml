---
title: SMB Admin Share Access for Lateral Movement
technique: T1021.002
id: c8e5f3a7-9d2b-4e6f-a4c1-8f3e9d2c7a5b
status: experimental
description: >-
  >- Detects lateral movement via SMB admin shares by monitoring for access to administrative shares (C$, ADMIN$, IPC$) from remote hosts that may indicate attacker attempts to move laterally through the network.
references:
  - https://attack.mitre.org/techniques/T1021/002/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - windows
  - sysmon
  - smb
  - admin_shares
logsource:
  product: windows
  service: security
detection:
  admin_share_access:
    EventID:
    ShareName|endswith:
      - 'C$'
      - 'ADMIN$'
      - 'IPC$'
    remote_access:
    IpAddress|startswith:
      - '10.'
      - '172.'
      - '192.168.'
    SubjectUserName|contains:
      - 'admin'
      - 'service'
  condition: admin_share_access and remote_access
falsepositives:
  - Legitimate administrative tools
  - System backup operations
level: medium
