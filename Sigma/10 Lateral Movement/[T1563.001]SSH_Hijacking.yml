---
title: SSH Session Hijacking Detection
technique: T1563.001
id: d4a9f6e8-2c7b-4e5f-a7d4-9f6e8c7b5a4b
status: experimental
description: >-
  >- Detects SSH session hijacking by monitoring for suspicious SSH session activities, connection takeovers, or unauthorized access to existing SSH sessions that may indicate session hijacking attempts.
references:
  - https://attack.mitre.org/techniques/T1563/001/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1563.001
  - windows
  - sysmon
  - ssh
  - session_hijacking
  - linux
logsource:
  product: linux
  service: sshd
detection:
  concurrent_sessions:
    program:
    message|contains:
    user|count|gte:
    session_reuse:
    program:
    message|contains:
      - 'session opened'
      - 'session closed'
    pty_allocation:
    program:
    message|contains:
      - 'Allocated pty'
      - 'Released pty'
  condition: concurrent_sessions or (session_reuse and pty_allocation)
falsepositives:
  - Legitimate multiple SSH sessions
  - Normal SSH reconnections
level: medium
