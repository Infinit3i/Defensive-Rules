---
title: Windows Remote Management Service Abuse
technique: T1028
id: a4c8f7e3-9b5d-4e6f-a4c8-7f3e9b5d6a4b
status: experimental
description: >-
  >- Detects abuse of Windows Remote Management service by monitoring for suspicious WinRM activities, unauthorized remote PowerShell sessions, or malicious use of remote management capabilities
  for lateral movement.
references:
  - https://attack.mitre.org/techniques/T1028/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1028
  - windows
  - sysmon
  - winrm
  - remote_management
  - powershell
logsource:
  product: windows
  service: microsoft-windows-winrm
detection:
  winrm_shell:
    EventID:
    ShellId|contains:
  remote_command:
    EventID:
    CommandLine|contains:
      - 'Invoke-Command'
      - 'Enter-PSSession'
  suspicious_user:
    EventID:
    User|contains:
      - 'admin'
      - 'service'
      - 'guest'
  condition: winrm_shell or remote_command or suspicious_user
falsepositives:
  - Legitimate PowerShell remoting
  - Authorized remote administration
level: medium
