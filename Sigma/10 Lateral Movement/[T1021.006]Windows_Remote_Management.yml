---
title: Windows Remote Management Lateral Movement
technique: T1021.006
id: a8d5e3f7-9c4b-4e6f-a2d8-8f5e9c4d7a3b
status: experimental
description: >-
  >- Detects lateral movement via Windows Remote Management (WinRM) by monitoring for WinRM connections, PowerShell remoting sessions, or suspicious remote command execution that may indicate
  attacker lateral movement.
references:
  - https://attack.mitre.org/techniques/T1021/006/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1021.006
  - windows
  - sysmon
  - winrm
  - powershell_remoting
logsource:
  product: windows
  service: microsoft-windows-winrm
detection:
  winrm_connection:
    EventID:
    User|contains:
      - 'admin'
      - 'service'
  remote_shell:
    EventID:
    ProcessName|contains:
      - 'wsmprovhost.exe'
      - 'powershell.exe'
  powershell_remoting:
    EventID:
    ClientIP|startswith:
      - '10.'
      - '172.'
      - '192.168.'
  condition: winrm_connection or remote_shell or powershell_remoting
falsepositives:
  - Legitimate PowerShell remoting
  - Authorized remote administration
level: medium
