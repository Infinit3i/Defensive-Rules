---
title: RDP Session Hijacking Detection
technique: T1563.002
id: e5b8f3a9-6d4c-4e7f-a5e8-8f3e9d4c6a5b
status: experimental
description: >-
  >- Detects RDP session hijacking by monitoring for suspicious RDP session takeovers, concurrent RDP sessions, or unauthorized access to existing RDP connections that may indicate session hijacking attempts.
references:
  - https://attack.mitre.org/techniques/T1563/002/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.lateral_movement
  - attack.t1563.002
  - windows
  - sysmon
  - rdp
  - session_hijacking
logsource:
  product: windows
  service: security
detection:
  rdp_session_start:
    EventID:
    LogonType:
    rdp_session_end:
    EventID:
    LogonType:
    concurrent_rdp:
    EventID:
    SessionName|count|gte:
    session_takeover:
    EventID:
    AccountName|contains:
      - 'admin'
      - 'service'
  condition: (rdp_session_start and rdp_session_end) or concurrent_rdp or session_takeover
falsepositives:
  - Legitimate RDP reconnections
  - Multiple authorized RDP sessions
level: medium
