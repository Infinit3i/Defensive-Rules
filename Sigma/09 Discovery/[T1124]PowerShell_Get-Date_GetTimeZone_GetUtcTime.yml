---
title: PowerShell Get-Date or Get-TimeZone usage
technique: T1124
id: 3b4c5d6e-7f80-9012-3456-7890abcdef12
status: experimental
description: >-
  Detects PowerShell usage that queries system time, timezone, or UTC time (Get-Date, Get-TimeZone, Get-Culture) which may be used for time discovery or time-based evasion.
references:
  - https://attack.mitre.org/techniques/T1124/
author: Infinit3i
date: 2025-10-19
tags:
  - attack.discovery
  - attack.t1124
  - windows
  - sysmon
  - tactic.discovery
  - platform:windows
  - technique:T1124
  - mitre_version:16.1
logsource:
  product: windows
  service: powershell
detection:
  selection_scriptblock:
    EventID:
    ScriptBlockText|contains:
      - "Get-Date"
      - "Get-TimeZone"
      - "Get-Culture"
      - "Get-Uptime"
      - "Get-Date -UFormat"
  selection_proc:
    EventID:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - "Get-Date"
      - "Get-TimeZone"
  condition: selection_scriptblock or selection_proc
falsepositives:
  - Legitimate scripts that log time, schedule tasks, or perform timestamping for monitoring/automation.
level: low
fields:
  - EventID
  - ScriptBlockText
  - Image
  - CommandLine
