---
title: System Information Discovery - WMIC Queries for OS and BIOS
technique: T1082
id: 2c9d2b34-5ba8-4c35-8f08-5f0e3d9ea8b2
status: experimental
description: >-
  Detect WMIC usage that queries OS, BIOS, or computer system information (e.g., wmic os get / wmic bios get / wmic computersystem). WMIC is commonly used by attackers for host enumeration.
author: Infinit3i
date: 2025-10-19
references:
  - https://attack.mitre.org/techniques/T1082/
tags:
  - attack.discovery
  - attack.t1082
  - windows
  - sysmon
  - tactic.discovery
  - platform:windows
logsource:
  product: windows
  service: sysmon
detection:
  selection_wmic_image:
  EventID:
  Image|endswith:
  selection_wmic_cmd:
  EventID:
  CommandLine|contains:
      - "wmic os get"
      - "wmic bios get"
      - "wmic computersystem get"
      - "wmic csproduct get"
  condition: selection_wmic_image and selection_wmic_cmd
falsepositives:
  - Administrative discovery and asset inventory scripts that use WMIC.
level: high
