---
title: PowerShell Get-Process or WMI/CIM Win32_Process Discovery
technique: T1057
id: a1057a01-1111-4c11-8a57-000000000003
status: experimental
description: >-
  Detects PowerShell-based process discovery via Get-Process, Get-WmiObject Win32_Process, or Get-CimInstance Win32_Process.
references:
  - https://attack.mitre.org/techniques/T1057/
author: Infinit3i
date: 2025-10-19
tags:
  - attack.discovery
  - attack.t1057
  - windows
  - sysmon
  - tactic.discovery
  - platform:windows
  - technique:T1057
  - mitre_version:16.1
logsource:
  product: windows
  service: powershell
detection:
  sel_scriptblock:
  EventID:
  ScriptBlockText|contains:
      - "Get-Process"
      - "Get-WmiObject"
      - "Get-CimInstance"
      - "Win32_Process"
  sel_proc_create:
  EventID:
  Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  CommandLine|contains:
      - "Get-Process"
      - "Get-WmiObject Win32_Process"
      - "Get-CimInstance Win32_Process"
  condition: sel_scriptblock or sel_proc_create
falsepositives:
  - Legitimate admin and monitoring scripts; Intune/SCCM actions.
level: medium
fields:
  - EventID
  - ScriptBlockText
  - Image
  - CommandLine
  - ParentImage
