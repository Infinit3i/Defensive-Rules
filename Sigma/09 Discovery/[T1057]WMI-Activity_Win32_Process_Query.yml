---
title: WMI Activity - Win32_Process Query
technique: T1057
id: a1057a01-1111-4c11-8a57-000000000004
status: experimental
description: >-
  Detects WMI queries against Win32_Process in the WMI-Activity Operational log (remote or local process discovery).
references:
  - https://attack.mitre.org/techniques/T1057/
author: Infinit3i
date: 2025-10-19
tags:
  - attack.discovery
  - attack.t1057
  - windows
  - sysmon
  - tactic.discovery
  - platform:windows
  - technique:T1057
  - mitre_version:16.1
logsource:
  product: windows
  service: wmi
detection:
  sel_query:
    EventID:
    Query|contains:
      - "Select * from Win32_Process"
      - "select Name,ProcessId from Win32_Process"
  sel_consumer:
    EventID:
    Consumer|contains:
  condition: sel_query or sel_consumer
falsepositives:
  - Enterprise management tooling performing inventory via WMI.
level: high
fields:
  - EventID
  - User
  - Computer
  - Query
  - Operation
