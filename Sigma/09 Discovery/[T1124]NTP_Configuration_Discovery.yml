date: 2026/04/27
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: 1
    CommandLine|contains:
      - 'w32tm /query /configuration'
      - 'w32tm /query /source'
      - 'w32tm /query /peers'
      - 'w32tm /query /status'
      - 'reg query HKLM\\SYSTEM\\CurrentControlSet\\Services\\W32Time'
      - 'Get-ItemProperty.*W32Time'
      - 'ntpq -p'
      - 'chrony sources'
  condition: selection
