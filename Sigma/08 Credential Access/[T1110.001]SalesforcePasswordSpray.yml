title: Salesforce Password Spray Attack
id: f1a2b3c4-5d6e-7890-ab12-3456789abcde
status: experimental
description: >-
  Detects password spray attacks against Salesforce accounts through multiple failed login attempts
author: Infinit3i
date: 2026/04/27
tags:
  - attack.credential_access
  - attack.t1110.001
  - salesforce
  - cloud
logsource:
  product: salesforce
  service: security
detection:
  selection_failed_login:
  EVENT_TYPE:
  LOGIN_STATUS:
  selection_multiple_users:
  SOURCE_IP:
  condition: selection_failed_login and selection_multiple_users
  timeframe: 10m
  count: 10
level: high
fields:
  - USERNAME
  - SOURCE_IP
  - USER_AGENT
  - LOGIN_STATUS
falsepositives:
  - Password reset campaigns
  - Legitimate users with expired passwords
references:
  - https://attack.mitre.org/techniques/T1110/001/
technique: T1110.001
