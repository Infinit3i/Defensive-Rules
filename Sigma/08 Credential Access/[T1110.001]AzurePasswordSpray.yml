title: Azure AD Password Spray Attack
id: e5f6a7b8-c9d0-1234-5678-901234567890
status: experimental
description: Detects password spray attacks against Azure AD accounts
author: Infinit3i
date: 2026/04/28
tags:
  - attack.credential_access
  - attack.t1110.001
  - azure_ad
  - password_spray
logsource:
  product: azure
  service: signin
detection:
  selection_failed_logins:
  Category:
  ResultType:
      - 50126
      - 50053
      - 50055
      - 50057
  selection_multiple_users:
  IPAddress:
  UserPrincipalName:
  selection_rapid_attempts:
  Category:
  TimeGenerated:
  condition: selection_failed_logins and selection_multiple_users
  timeframe: 10m
  count: 20
level: high
fields:
  - UserPrincipalName
  - IPAddress
  - Location
  - UserAgent
  - ResultType
falsepositives:
  - Password reset campaigns
  - User training exercises
  - Legacy application authentication
references:
  - https://attack.mitre.org/techniques/T1110/001/
technique: T1110.001
