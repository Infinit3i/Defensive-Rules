---
title: BOF-Based LSASS Memory Dumping
technique: T1003.001
id: b5c6d7e8-f9a0-1234-5678-90abcdef1234
status: experimental
description: Detects BOF credential dumping through LSASS memory access patterns
author: matthewiver@protonmail.com
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://www.cobaltstrike.com/blog/beacon-object-files-luser-defined-reflective-loader/
logsource:
  product: windows
  service: sysmon
detection:
  lsass_access:
    EventID: 1
    TargetImage|endswith:
    GrantedAccess:
      - '0x1010'
      - '0x1038'
      - '0x40'
  bof_indicators:
    SourceImage|contains:
      - 'rundll32.exe'
      - 'regsvr32.exe'
    CallTrace|contains:
      - 'UNKNOWN'
      - 'ntdll.dll'
  memory_patterns:
    EventID: 1
    ImageLoaded|contains:
      - 'dbgcore.dll'
      - 'dbghelp.dll'
  condition: lsass_access and (bof_indicators or memory_patterns)
fields:
  - SourceImage
  - TargetImage
  - GrantedAccess
  - CallTrace
  - SourceProcessId
  - TargetProcessId
falsepositives:
  - Windows Error Reporting
  - Process monitoring tools
  - Debugging applications
level: high
tags:
  - attack.credential_access
  - attack.t1003.001
  - bof
  - lsass
  - memory_dump
  - sysmon
  - windows
