title: Early Bird Process Injection Detection
technique: T1055.004
author: Infinit3i
date: 2026/04/28
id: b7c4e9f2-8d5a-4c3b-9e1f-7a2d5c8b4e9a
status: experimental
description: >-
  Detects Early Bird process injection technique where malicious code is injected into a process before its main thread begins execution, bypassing many security monitoring solutions
logsource:
  product: windows
  service: sysmon
detection:
  selection_process_create:
  EventID:
  selection_process_access:
  EventID:
  GrantedAccess:
      - '0x1F3FFF'  # PROCESS_ALL_ACCESS
      - '0x1FFFFF'  # PROCESS_ALL_ACCESS (alternative)
      - '0x143A'    # Common injection access
      - '0x1438'    # WriteProcessMemory + CreateRemoteThread
  CallTrace|contains:
      - 'ntdll.dll+NtQueueApcThread'
      - 'ntdll.dll+NtCreateThread'
      - 'kernel32.dll+WriteProcessMemory'
      - 'ntdll.dll+NtWriteVirtualMemory'
  selection_image_load:
  EventID:
  ImageLoaded|contains:
      - 'ntdll.dll'
  ProcessId:
  selection_thread_create:
  EventID:
  StartModule|contains:
      - 'ntdll.dll'
  NewThreadId:
  time_correlation:
    # Events should occur within 5 seconds of process creation
      - EventID: 1
      - EventID: 10
      - EventID: 7
      - EventID: 8
  suspicious_targets:
  TargetImage|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
      - '\winlogon.exe'
      - '\lsass.exe'
      - '\dwm.exe'
      - '\csrss.exe'
  condition: |
    selection_process_create and selection_process_access and selection_thread_create and suspicious_targets
falsepositives:
  - Legitimate debugging tools
  - Security software performing process analysis
  - System administration tools
level: critical
tags:
  - attack.t1055.004
  - windows
  - sysmon
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055
  - process_injection
references:
  - https://attack.mitre.org/techniques/T1055/004/
  - https://blog.malwarebytes.com/threat-analysis/2019/09/early-bird-injection/
