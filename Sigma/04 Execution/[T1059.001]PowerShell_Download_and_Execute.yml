---
title: PowerShell Download and Execute Patterns
technique: T1059.001
id: m3n4o5p6-q7r8-9012-3456-789012mnopqr
status: experimental
description: Detects PowerShell commands that download and execute files or scripts
author: Infinit3i
date: 2026/04/27
logsource:
  product: windows
  service: powershell-classic
detection:
  selection_download:
  EventID: 4104
  Message|contains:
      - 'DownloadString'
      - 'DownloadFile'
      - 'Invoke-WebRequest'
      - 'iwr'
      - 'wget'
      - 'curl'
      - 'WebClient'
      - 'Net.WebClient'
      - 'Start-BitsTransfer'
  selection_execute:
  EventID: 4104
  Message|contains:
      - 'Invoke-Expression'
      - 'iex'
      - 'Invoke-Command'
      - 'icm'
      - 'Start-Process'
      - 'saps'
      - '&'
      - 'cmd /c'
      - 'powershell -c'
  selection_fileless:
  EventID: 4104
  Message|contains:
      - 'FromBase64String'
      - 'EncodedCommand'
      - 'Reflection.Assembly'
      - 'Load'
      - 'GetType'
      - 'GetMethod'
      - 'Invoke'
  suspicious_domains:
  Message|contains:
      - 'raw.githubusercontent'
      - 'pastebin.com'
      - 'hastebin'
      - 'ghostbin'
      - 'bit.ly'
      - 'tinyurl'
      - '.tk'
      - '.ml'
      - '.ga'
      - '.cf'
  condition: (selection_download and selection_execute) or (selection_download and suspicious_domains) or selection_fileless
fields:
  - Computer
  - User
  - ProcessId
  - ScriptBlockId
  - Message
falsepositives:
  - Legitimate PowerShell scripts
  - Software installation
  - System administration
level: high
tags:
  # MITRE ATT&CK tactic
  - attack.execution
  # MITRE ATT&CK technique
  - attack.t1059.001
  # Platform/tool tags
  - windows
  - sysmon
  - attack.execution
  - attack.t1059.001
  - powershell
  - windows
