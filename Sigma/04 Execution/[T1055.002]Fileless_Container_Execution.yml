title: Fileless Code Execution in Container Environments
technique: T1055.002
id: f8c1d4e7-a3b6-4f9c-8e2a-1d5b3c7f9a2e
status: experimental
description: >-
  Detects fileless malware execution techniques within containerized environments using memory-resident payloads
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1055/002/
  - https://www.crowdstrike.com/blog/fileless-malware-in-containers/
logsource:
  product: linux
  service: auditd
detection:
  selection_memfd_create:
  type:
  syscall:
  success:
  selection_proc_self_mem:
  type:
  name|contains:
      - '/proc/self/mem'
      - '/proc/*/mem'
      - '/dev/shm'
  selection_ptrace_injection:
  type:
  syscall:
  a0|contains:
      - 'PTRACE_POKETEXT'
      - 'PTRACE_POKEDATA'
      - 'PTRACE_SETREGS'
      - 'PTRACE_ATTACH'
  success:
  selection_mmap_execution:
  type:
  syscall:
  a2|contains:
      - 'PROT_EXEC'
      - 'PROT_READ|PROT_WRITE|PROT_EXEC'
  success:
  selection_execve_memfd:
  type:
  syscall:
  a0|startswith:
      - '/proc/self/fd/'
      - '/dev/fd/'
  success:
  selection_container_escape:
  type:
  name|contains:
      - '/var/lib/docker'
      - '/var/run/docker.sock'
      - '/proc/1/root'
      - '/host'
  selection_shared_memory:
  type:
  syscall:
      - 'shmget'
      - 'shmat'
      - 'shmctl'
  success:
  selection_process_injection:
  type:
  syscall:
  success:
  selection_ld_preload:
  type:
  a2|contains:
  condition: 1 of selection_*
falsepositives:
  - Legitimate container runtime operations
  - Dynamic linking and library loading
  - Performance optimization tools
  - Container orchestration platforms
level: high
tags:
  - attack.execution
  - attack.t1055.002
  - windows
  - sysmon
  - attack.defense_evasion
  - attack.t1055
  - fileless_execution
  - container_security
  - memory_injection
  - linux
  - auditd
