---
title: PowerShell Download and Execution from Remote Source
technique: T1086

id: 9e2c3f5a-8f88-4b77-bd29-2222bbbapsh2
status: experimental
description: Detects PowerShell commands that download and execute scripts or payloads directly from remote URLs or network shares.
author: Infinit3i
date: 2025-10-19
references:
  - https://attack.mitre.org/techniques/T1086/
logsource:
  product: windows
  service: sysmon
  category: process_creation
detection:
  selection_image:
  Image|endswith: '\powershell.exe'
  selection_remote:
  CommandLine|contains:
      - 'Invoke-WebRequest'
      - 'Start-BitsTransfer'
      - 'DownloadString'
      - 'DownloadFile'
      - 'Net.WebClient'
      - 'IEX'
  selection_protocol:
  CommandLine|contains:
      - 'http://'
      - 'https://'
      - '\\\\'
  condition: selection_image and selection_remote and selection_protocol
fields:
  - CommandLine
  - ParentCommandLine
  - Image
  - User
  - ParentImage
falsepositives:
  - Legitimate update scripts or cloud-based administration tasks
level: critical
tags:
  # MITRE ATT&CK tactic
  - attack.execution
  # MITRE ATT&CK technique
  - attack.t1086
  # Platform/tool tags
  - windows
  - sysmon
