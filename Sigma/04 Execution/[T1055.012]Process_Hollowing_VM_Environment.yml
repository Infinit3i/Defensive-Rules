title: Process Hollowing in Virtualized Environments
technique: T1055.012
id: c5f2a8b1-d3e7-4c9a-8f6b-1a4d2e5c3b7f
status: experimental
description: >-
  Detects process hollowing techniques specifically designed to evade detection in virtual machine environments
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1055/012/
  - https://www.elastic.co/guide/en/security/current/process-injection-detected.html
logsource:
  product: windows
  service: sysmon
detection:
  selection_process_creation:
  EventID:
  ParentImage|endswith:
      - '\explorer.exe'
      - '\winlogon.exe'
      - '\services.exe'
  Image|endswith:
      - '\svchost.exe'
      - '\rundll32.exe'
      - '\dllhost.exe'
      - '\regsvr32.exe'
  CommandLine|contains:
      - '/s'
      - '-s'
      - 'silent'
  selection_process_access:
  EventID:
  SourceImage|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
  TargetImage|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
      - '\winlogon.exe'
  GrantedAccess:
      - '0x1F0FFF'
      - '0x1FFFFF'
      - '0x143A'
      - '0x1410'
      - '0x1438'
  selection_image_load:
  EventID:
  Image|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
      - '\winlogon.exe'
  ImageLoaded|endswith:
      - '\ntdll.dll'
      - '\kernel32.dll'
      - '\kernelbase.dll'
  Signed:
  selection_vm_timing:
  EventID:
  CommandLine|contains|all:
      - 'sleep'
      - 'delay'
  CommandLine|contains:
      - '30000'
      - '60000'
      - '120000'
      - '180000'
  selection_api_calls:
  EventID:
  CallTrace|contains:
      - 'CreateRemoteThread'
      - 'WriteProcessMemory'
      - 'VirtualAllocEx'
      - 'NtUnmapViewOfSection'
      - 'NtMapViewOfSection'
      - 'ZwUnmapViewOfSection'
  condition: |
    selection_process_creation and (selection_process_access or selection_image_load) and (selection_vm_timing or selection_api_calls)
falsepositives:
  - Legitimate software installation
  - System maintenance operations
  - Antivirus software behavior
level: high
tags:
  - attack.execution
  - attack.t1055.012
  - windows
  - sysmon
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055
  - process_hollowing
  - vm_evasion
