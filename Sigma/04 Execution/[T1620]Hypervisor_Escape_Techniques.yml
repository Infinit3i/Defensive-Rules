title: Hypervisor Escape and VM Breakout Attempts
id: a9e2f5c8-b7d4-4c1f-9e6a-2b8d5f1c3e7b
status: experimental
description: Detects attempts to escape from virtual machine guest environments to compromise the hypervisor or host system
author: matthewiver@protonmail.com
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1620/
  - https://www.vmware.com/security/hardening-guides.html
logsource:
  product: windows
  service: sysmon
detection:
  selection_vmware_tools_abuse:
    EventID: 1
    Image|endswith:
      - '\vmtoolsd.exe'
      - '\vmwaretray.exe'
      - '\vmwareuser.exe'
    CommandLine|contains:
      - '-cmd'
      - '-command'
      - '-script'
      - 'guestinfo'
  selection_vm_backdoor:
    EventID: 1
    CommandLine|contains:
      - 'VMware backdoor'
      - 'in al, 0x5658'
      - 'vmware_backdoor'
      - 'hypervisor_cpuid'
  selection_shared_folders:
    EventID: 11  # File create
    TargetFilename|startswith:
      - '\\vmware-host\'
      - '\\vboxsrv\'
      - '\\vboxsvr\'
      - 'Z:\'
      - 'E:\'
    TargetFilename|endswith:
      - '.exe'
      - '.dll'
      - '.bat'
      - '.ps1'
      - '.vbs'
  selection_clipboard_access:
    EventID: 1
    CommandLine|contains:
      - 'GetClipboardData'
      - 'SetClipboardData'
      - 'OpenClipboard'
      - 'vmware-vmx'
  selection_vm_memory_access:
    EventID: 10  # Process access
    TargetImage|endswith:
      - '\vmware-vmx.exe'
      - '\VBoxHeadless.exe'
      - '\qemu-system-x86_64.exe'
    GrantedAccess:
      - '0x1F0FFF'
      - '0x1FFFFF'
  selection_device_exploitation:
    EventID: 1
    CommandLine|contains:
      - 'CreateFile'
      - '\\\\.\\pipe\\'
      - '\\\\.\\mailslot\\'
      - '\\\\.\\vmci'
      - '\\\\.\\vmmouse'
  selection_dma_attack:
    EventID: 1
    CommandLine|contains:
      - 'physical memory'
      - 'DMA'
      - 'IOMMU'
      - 'PCI'
      - 'memory mapping'
  selection_vm_communication:
    EventID: 3  # Network connection
    DestinationIp:
      - '169.254.1.1'  # VMware host-guest communication
      - '10.0.2.2'     # VirtualBox host
      - '192.168.122.1' # QEMU/KVM default
    DestinationPort:
      - 427    # Service Location Protocol
      - 902    # VMware vCenter
      - 903    # VMware console
  selection_hypercall:
    EventID: 1
    CommandLine|contains:
      - 'hypercall'
      - 'vmcall'
      - 'vmmcall'
      - 'syscall'
      - 'int 0x2e'
  condition: 2 of selection_*
falsepositives:
  - Legitimate VMware Tools operations
  - Virtual machine administration
  - Shared folder access
  - VM performance monitoring
level: critical
tags:
  - attack.escape_virtualization
  - attack.t1620
  - hypervisor_escape
  - vm_breakout
  - sysmon
  - windows
  - virtualization