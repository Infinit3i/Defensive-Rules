title: CPUID-Based Virtual Machine Detection Evasion
technique: T1497.001
id: a3f8b2c1-e4d7-4a9b-8c6f-1e5a2b3d4c5f
status: experimental
description: >-
  Detects attempts to bypass virtual machine detection using CPUID instruction manipulation and timing analysis
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1497/001/
  - https://evasions.checkpoint.com/techniques/generic.html
logsource:
  product: windows
  service: sysmon
detection:
  selection_cpuid_check:
  EventID:
  Image|endswith:
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\powershell.exe'
      - '\cmd.exe'
  CommandLine|contains:
      - 'cpuid'
      - 'rdtsc'
      - 'cpu_vendor'
      - 'hypervisor_present'
  selection_timing_attack:
  EventID:
  CommandLine|contains|all:
      - 'timer'
      - 'performance'
      - 'benchmark'
  CommandLine|contains:
      - 'QueryPerformanceCounter'
      - 'GetTickCount'
      - 'timeGetTime'
      - 'clock_gettime'
  selection_vm_artifacts:
  EventID:
  CommandLine|contains:
      - 'vmware'
      - 'virtualbox'
      - 'vbox'
      - 'qemu'
      - 'xen'
      - 'hyper-v'
      - 'parallels'
  selection_registry_vm_check:
  EventID:
  TargetObject|contains:
      - '\HARDWARE\Description\System\BIOS'
      - '\HARDWARE\Description\System\SystemBiosVersion'
      - '\SYSTEM\CurrentControlSet\Services\Disk\Enum'
      - '\SYSTEM\ControlSet001\Services\Disk\Enum'
  selection_process_hollowing:
  EventID:
  GrantedAccess:
      - '0x1F0FFF'
      - '0x1FFFFF'
      - '0x143A'
      - '0x1410'
  CallTrace|contains:
      - 'KERNELBASE.dll+CreateRemoteThread'
      - 'ntdll.dll+NtCreateThreadEx'
      - 'KERNEL32.dll+WriteProcessMemory'
  condition: 1 of selection_*
falsepositives:
  - Legitimate system performance monitoring tools
  - Hardware inventory software
  - Virtualization management tools
level: high
tags:
  - attack.execution
  - attack.t1497.001
  - windows
  - sysmon
  - attack.defense_evasion
  - attack.t1497
  - vm_evasion
