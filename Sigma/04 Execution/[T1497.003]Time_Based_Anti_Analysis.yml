title: Time-Based Anti-Analysis and Sandbox Evasion
technique: T1497.003
id: d6a3b9c4-e1f8-4d2b-9c7a-3e5f1b8d4c6a
status: experimental
description: >-
  Detects malware using timing-based techniques to evade automated analysis and sandbox environments
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1497/003/
  - https://www.fireeye.com/blog/threat-research/2017/02/hiding_in_plain_sigh.html
logsource:
  product: windows
  service: sysmon
detection:
  selection_timing_functions:
  EventID:
  CommandLine|contains:
      - 'QueryPerformanceCounter'
      - 'GetTickCount'
      - 'timeGetTime'
      - 'GetSystemTimeAsFileTime'
      - 'NtQuerySystemTime'
      - 'clock_gettime'
      - 'gettimeofday'
  selection_sleep_delays:
  EventID:
  CommandLine|contains:
      - 'Sleep('
      - 'sleep '
      - 'usleep'
      - 'nanosleep'
      - 'select('
      - 'WaitForSingleObject'
  CommandLine|re:
  selection_date_checks:
  EventID:
  CommandLine|contains|all:
      - 'date'
      - 'time'
  CommandLine|contains:
      - 'GetSystemTime'
      - 'GetLocalTime'
      - 'SystemTimeToFileTime'
      - 'GetDateFormat'
      - 'GetTimeFormat'
  selection_execution_delay:
  EventID:
  CommandLine|contains:
      - 'ping 127.0.0.1'
      - 'ping localhost'
      - 'timeout'
      - 'waitfor'
  CommandLine|re:
  selection_vm_specific_timing:
  EventID:
  CommandLine|contains|all:
      - 'rdtsc'
      - 'cpu'
  CommandLine|contains:
      - 'frequency'
      - 'speed'
      - 'performance'
      - 'benchmark'
  selection_user_interaction:
  EventID:
  CommandLine|contains:
      - 'GetCursorPos'
      - 'GetAsyncKeyState'
      - 'GetForegroundWindow'
      - 'FindWindow'
      - 'GetWindowText'
      - 'mouse_event'
      - 'keybd_event'
  selection_file_timestamps:
  EventID:
      - 11
      - 2  # File creation time change
  TargetFilename|endswith:
  condition: 2 of selection_*
falsepositives:
  - Legitimate applications with timing requirements
  - Performance benchmarking tools
  - System monitoring utilities
  - Games and multimedia applications
level: medium
tags:
  - attack.execution
  - attack.t1497.003
  - windows
  - sysmon
  - attack.defense_evasion
  - attack.t1497
  - timing_attack
  - sandbox_evasion
