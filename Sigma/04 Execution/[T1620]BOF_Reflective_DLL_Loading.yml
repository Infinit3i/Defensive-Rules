---
title: BOF Reflective DLL Loading Detection
technique: T1620
id: ed180e92-e51c-49f7-b883-332548bef19b
status: experimental
description: Detects BOF execution through reflective DLL loading techniques
references:
  - https://attack.mitre.org/techniques/T1620/
  - https://github.com/stephenfewer/ReflectiveDLLInjection
author: Infinit3i
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
detection:
  sel_process:
    EventID: 1
    Image|endswith:
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\powershell.exe'
  sel_dll_load:
    EventID: 1
    ImageLoaded|contains:
    Signed:
  sel_memory:
    EventID: 1
    GrantedAccess:
    CallTrace|contains:
      - 'ReflectiveLoader'
      - 'DllMain'
      - 'UNKNOWN'
  sel_cmdline:
    CommandLine|contains:
      - 'ReflectivePick'
      - 'ReflectiveLoader'
      - 'LoadLibrary'
      - 'GetProcAddress'
  condition: (sel_process and sel_dll_load) or (sel_memory and sel_cmdline)
falsepositives:
  - Legitimate software using reflective loading
  - Penetration testing tools
level: high
tags:
  - attack.execution
  - attack.t1620
  - attack.t1055.001
  - windows
  - sysmon
  - cobalt_strike
  - bof
