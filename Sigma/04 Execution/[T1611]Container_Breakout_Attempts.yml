title: Container Escape and Breakout Attempts
technique: T1611
id: b4e9c3d2-f6a8-4b1c-9d7e-2f3a5c8b1e4f
status: experimental
description: >-
  Detects attempts to escape from containerized environments and break out to the host system
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1611/
  - https://kubernetes.io/docs/concepts/security/pod-security-standards/
logsource:
  product: linux
  service: auditd
detection:
  selection_privileged_container:
  type:
  syscall:
      - 'mount'
      - 'umount'
      - 'pivot_root'
      - 'chroot'
      - 'unshare'
      - 'clone'
  success:
  selection_proc_filesystem:
  type:
  name|contains:
      - '/proc/1/root'
      - '/proc/self/root'
      - '/proc/*/root'
      - '/host'
      - '/var/lib/docker'
      - '/var/run/docker.sock'
  selection_device_access:
  type:
  name|startswith:
      - '/dev/disk'
      - '/dev/sd'
      - '/dev/nvme'
      - '/dev/loop'
      - '/dev/dm-'
      - '/dev/mapper'
  selection_kernel_modules:
  type:
  syscall:
      - 'init_module'
      - 'finit_module'
      - 'delete_module'
  success:
  selection_namespace_escape:
  type:
  syscall:
  a0|contains:
      - '/proc/1/ns'
      - '/proc/self/ns'
  success:
  selection_cgroup_manipulation:
  type:
  name|contains:
      - '/sys/fs/cgroup'
      - '/proc/cgroups'
      - '/proc/self/cgroup'
  selection_capabilities:
  type:
  syscall:
  success:
  condition: 1 of selection_*
falsepositives:
  - Legitimate container orchestration operations
  - System administration tasks
  - Container runtime operations
level: critical
tags:
  - attack.execution
  - attack.t1611
  - windows
  - sysmon
  - attack.privilege_escalation
  - container_escape
  - linux
  - auditd
  - kubernetes
  - docker
