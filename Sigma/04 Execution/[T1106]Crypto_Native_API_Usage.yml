---
title: Cryptographic Native API Usage
id: b1c2d3e4-f5g6-7890-abcd-555555555555
status: experimental
description: Detects suspicious cryptographic operations via native APIs
author: Matthew Iverson
date: 2026/04/27
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: 1
    CommandLine|contains:
      - 'CryptAcquireContext'
      - 'CryptCreateHash'
      - 'CryptHashData'
      - 'CryptGetHashParam'
      - 'CryptEncrypt'
      - 'CryptDecrypt'
      - 'CryptGenKey'
      - 'CryptImportKey'
      - 'CryptExportKey'
      - 'BCryptOpenAlgorithmProvider'
      - 'BCryptCreateHash'
      - 'BCryptHashData'
      - 'BCryptEncrypt'
      - 'BCryptDecrypt'
      - 'BCryptGenRandom'
  condition: selection
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
falsepositives:
  - Encryption software
  - Security applications
  - Digital signature tools
level: medium
tags:
  - attack.execution
  - attack.t1106
  - sysmon
  - windows
