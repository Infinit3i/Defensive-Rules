title: Dependency Confusion Attack via Package Manager
id: d6e9a3f7-2c5b-4e8d-9f7a-e3c6d9f2b5e8
status: experimental
description: Detects dependency confusion attacks targeting internal package names with malicious public packages
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1195/003/
logsource:
  product: package-manager
  service: pip
detection:
  selection_internal_pattern:
    PackageName|contains:
      - 'internal-'
      - 'company-'
      - 'corp-'
      - 'private-'
      - 'org-'
  selection_public_repo:
    RepositoryURL|contains:
      - 'pypi.org'
      - 'npmjs.com'
      - 'rubygems.org'
  selection_suspicious_version:
    PackageVersion|contains:
      - '99.'
      - '999.'
      - '9999.'
  selection_recent_upload:
    UploadDate|gte: 'now-7d'
  condition: selection_internal_pattern and selection_public_repo and (selection_suspicious_version or selection_recent_upload)
level: high
tags:
  - attack.initial-access
  - attack.t1195
  - attack.t1195.003
  - dependency-confusion
  - package-manager
technique: T1195.003
