---
title: Default Account Abuse Detection
technique: T1078.001
id: d3a8e5f1-4c7b-4e2f-b6a9-8e1c3f7d2a5b
status: experimental
description: >-
  Detects cloud-based security attacks and access attempts. Detects abuse of default accounts by monitoring for authentication attempts using common default usernames, unchanged default passwords, or suspicious activities from well-known default service accounts.
references:
  - https://attack.mitre.org/techniques/T1078/001/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.initial_access
  - attack.t1078.001
  - windows
  - sysmon
  - default_account
  - authentication
  - weak_credentials
logsource:
  product: windows
  service: security
detection:
  default_users:
  EventID:
  TargetUserName|contains:
      - 'admin'
      - 'administrator'
      - 'guest'
      - 'test'
      - 'user'
      - 'default'
      - 'sa'
  service_accounts:
  EventID:
  TargetUserName|startswith:
      - 'svc'
      - 'service'
  LogonType:
  condition: default_users or service_accounts
falsepositives:
  - Legitimate use of administrative accounts
  - Authorized service account activities
level: medium
