title: Hardware Implant Device Detection
id: i9j0k1l2-m3n4-5678-ijkl-901234567890
status: experimental
description: >-
  >- Detects suspicious hardware additions through USB device enumeration and network interface changes
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1200/
logsource:
  product: windows
  service: system
detection:
  selection_usb:
    EventID:
    Source:
    Message|contains:
      - 'USB'
      - 'device'
  selection_network:
    EventID:
    Source:
    ProcessName|contains:
  selection_unknown:
    EventID:
    Message|contains:
      - 'unknown'
      - 'unrecognized'
      - 'generic'
  condition: (selection_usb and selection_network) or selection_unknown
falsepositives:
  - Legitimate hardware installations
  - Driver updates and installations
level: high
tags:
  - attack.initial_access
  - attack.t1200
  - windows
  - hardware
technique: T1200
