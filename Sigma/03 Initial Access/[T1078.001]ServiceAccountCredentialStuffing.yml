title: Service Account Credential Stuffing Attack
id: a8b9c1d2-3e4f-5678-9abc-def123456789
status: experimental
description: >-
  Detects credential stuffing attacks targeting service accounts through rapid authentication attempts
author: Infinit3i
date: 2026/04/27
modified: 2026/04/27
tags:
  - attack.initial_access
  - attack.t1078.001
  - attack.credential_access
  - windows
  - sysmon
logsource:
  product: windows
  service: security
detection:
  selection_logon_type:
    EventID:
    LogonType:
      - 3  # Network logon
      - 4  # Batch logon
  selection_service_accounts:
    TargetUserName|contains:
      - 'svc'
      - 'service'
      - '$'
      - 'backup'
      - 'sql'
  selection_auth_pattern:
    ProcessName|contains:
      - 'python'
      - 'curl'
      - 'powershell'
      - 'rundll32'
  condition: all of selection_*
  timeframe: 5m
  count: 20
level: high
fields:
  - TargetUserName
  - IpAddress
  - ProcessName
  - LogonType
falsepositives:
  - Legitimate automated service authentication
  - Service account maintenance activities
references:
  - https://attack.mitre.org/techniques/T1078/001/
technique: T1078.001
