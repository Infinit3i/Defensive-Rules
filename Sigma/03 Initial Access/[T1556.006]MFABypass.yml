title: Multi-Factor Authentication Bypass Detection
id: o5p6q7r8-s9t0-1234-opqr-567890123456
status: experimental
description: >-
  >- Detects attempts to bypass MFA through authentication process modification and push bombing
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1556/006/
logsource:
  product: azure
  service: activedirectory
detection:
  selection_mfa:
    Category:
    OperationName|contains:
      - 'Sign-in activity'
      - 'User Risk Detection'
    selection_bypass:
    AuthenticationRequirement:
    ResultType:
    RiskState|contains:
      - 'atRisk'
      - 'confirmedCompromised'
    selection_suspicious:
    Location|contains:
    ClientAppUsed|contains:
      - 'Browser'
      - 'Modern Auth'
  condition: selection_mfa and selection_bypass and selection_suspicious
falsepositives:
  - Legitimate MFA exceptions
  - New device registrations
level: high
tags:
  - attack.initial_access
  - attack.t1556.006
  - azure
  - mfa
technique: T1556.006
