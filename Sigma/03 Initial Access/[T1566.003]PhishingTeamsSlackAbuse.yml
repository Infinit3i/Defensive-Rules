title: Phishing via Microsoft Teams or Slack External Links
id: a5e8f2c9-7b4d-3e6a-9c1f-d8b5a7e9c2f4
status: experimental
description: Detects phishing attempts through Teams/Slack messages containing suspicious external links
author: Infinit3i
date: 2026/04/27
references:
    - https://attack.mitre.org/techniques/T1566/003/
logsource:
    product: office365
    service: teams
detection:
    selection_external_link:
        MessageContent|contains:
            - 'http'
            - 'https'
    selection_suspicious_domains:
        MessageContent|contains:
            - '.tk'
            - '.ml'
            - '.ga'
            - 'bit.ly'
            - 'tinyurl.com'
            - 'cutt.ly'
    selection_urgency:
        MessageContent|contains:
            - 'urgent'
            - 'immediate'
            - 'expires'
            - 'suspended'
            - 'verify account'
            - 'click here'
    selection_external_sender:
        SenderType: External
    condition: selection_external_link and selection_external_sender and (selection_suspicious_domains or selection_urgency)
level: medium
tags:
    - attack.initial-access
    - attack.t1566
    - attack.t1566.003
    - teams
    - collaboration
technique: T1566.003