---
title: Drive-by Compromise Detection
technique: T1189
id: e7f2c9a4-8b5d-4e1f-a3c6-9f2e7d8c4a1b
status: experimental
description: >-
  Detects cloud-based security attacks and access attempts. Detects drive-by compromise attempts by monitoring for malicious web content exploitation, suspicious JavaScript execution, and browser exploit patterns that may lead to initial system compromise.
references:
  - https://attack.mitre.org/techniques/T1189/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.initial_access
  - attack.t1189
  - windows
  - sysmon
  - browser
  - exploit
  - javascript
logsource:
  product: zeek
  service: http
detection:
  malicious_js:
  uri|contains:
      - 'eval('
      - 'unescape('
      - 'fromCharCode('
  method:
  exploit_kit:
  user_agent|contains:
      - 'exploit'
      - 'kit'
      - 'angler'
      - 'blackhole'
  suspicious_redirect:
  response_code:
  location|contains:
      - 'bit.ly'
      - 'tinyurl'
      - '.tk/'
  condition: malicious_js or exploit_kit or suspicious_redirect
falsepositives:
  - Legitimate JavaScript applications
  - Normal website redirects
level: high
