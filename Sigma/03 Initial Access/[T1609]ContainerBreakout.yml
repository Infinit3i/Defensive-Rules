title: Container Breakout Detection
id: v2w3x4y5-z6a7-8901-vwxy-234567890123
status: experimental
description: >-
  Detects container escape attempts through privilege escalation and host system access
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1609/
logsource:
  product: linux
  service: auditd
detection:
  selection_mount:
  type:
  syscall:
  a1|contains:
      - '/proc'
      - '/sys'
      - '/dev'
      - '/host'
  selection_namespace:
  type:
  syscall|contains:
      - 'setns'
      - 'unshare'
  success:
  selection_capabilities:
  type:
  syscall:
  capability|contains:
      - 'cap_sys_admin'
      - 'cap_dac_override'
  condition: selection_mount or selection_namespace or selection_capabilities
falsepositives:
  - Container runtime operations
  - System monitoring tools
level: high
tags:
  - attack.initial_access
  - attack.t1609
  - linux
  - container
technique: T1609
