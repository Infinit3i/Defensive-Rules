title: Web Content Defacement Detection
id: w3x4y5z6-a7b8-9012-wxyz-345678901234
status: experimental
description: Detects web defacement attempts through unauthorized content modification and injection attacks
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1659/
logsource:
  product: apache
  service: access
detection:
  selection_methods:
    method:
      - 'PUT'
      - 'PATCH'
      - 'DELETE'
    status: 200
  selection_injection:
    uri|contains:
      - '<script>'
      - '<iframe>'
      - 'javascript:'
      - 'data:'
    method: 'POST'
  selection_upload:
    uri|contains:
      - 'upload'
      - 'file'
      - 'image'
    status: 200
    content_length: '>1000'
  condition: selection_methods or selection_injection or selection_upload
falsepositives:
  - Legitimate content management operations
  - File upload functionality
level: medium
tags:
  - attack.initial_access
  - attack.t1659
  - apache
  - web
technique: T1659
