title: OAuth Application Token Theft Detection
id: k1l2m3n4-o5p6-7890-klmn-123456789012
status: experimental
description: >-
  Detects stolen OAuth tokens through suspicious application authorization patterns and token usage
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1528/
logsource:
  product: azure
  service: activedirectory
detection:
  selection_oauth:
    Category:
    OperationName|contains:
      - 'Add application'
      - 'Update application'
      - 'Add service principal'
  selection_suspicious:
    ResultType:
    InitiatedBy|contains:
    TargetResources|contains:
      - 'Microsoft Graph'
      - 'Office 365'
  selection_permissions:
    ModifiedProperties|contains:
      - 'AppRoleAssignments'
      - 'Oauth2PermissionGrants'
  condition: selection_oauth and selection_suspicious and selection_permissions
falsepositives:
  - Legitimate application registrations
  - Administrative OAuth configurations
level: high
tags:
  - attack.initial_access
  - attack.t1528
  - azure
  - oauth
technique: T1528
