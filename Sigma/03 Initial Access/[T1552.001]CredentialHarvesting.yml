title: Credential Harvesting from Files Detection
id: m3n4o5p6-q7r8-9012-mnop-345678901234
status: experimental
description: Detects credential harvesting attempts through file system searches for passwords and secrets
author: Infinit3i
date: 2026/04/27
references:
    - https://attack.mitre.org/techniques/T1552/001/
logsource:
    product: windows
    service: sysmon
detection:
    selection_search:
        EventID: 1
        CommandLine|contains:
            - 'findstr'
            - 'select-string'
            - 'grep'
    selection_keywords:
        CommandLine|contains:
            - 'password'
            - 'passwd'
            - 'credential'
            - 'secret'
            - 'token'
            - 'api_key'
    selection_files:
        CommandLine|contains:
            - '.txt'
            - '.xml'
            - '.config'
            - '.json'
            - '.ini'
    condition: selection_search and selection_keywords and selection_files
falsepositives:
    - Administrative password management
    - Legitimate credential auditing
level: medium
tags:
    - attack.initial_access
    - attack.t1552.001
    - sysmon
    - credentials
technique: T1552.001