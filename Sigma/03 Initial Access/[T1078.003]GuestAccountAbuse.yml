title: Guest Account Abuse and Privilege Escalation
id: f1e2d3c4-b5a6-7890-1234-56789abcdef0
status: experimental
description: Detects abuse of guest accounts for initial access and privilege escalation attempts
author: Infinit3i
date: 2026/04/27
modified: 2026/04/27
tags:
    - attack.initial_access
    - attack.t1078.003
    - attack.defense_evasion
    - windows
    - security
logsource:
    product: windows
    service: security
detection:
    selection_guest_logon:
        EventID: 4624
        TargetUserName|contains:
            - 'guest'
            - 'Guest'
            - 'IUSR'
    selection_suspicious_activity:
        EventID:
            - 4648  # Explicit credential use
            - 4672  # Special privileges assigned
            - 4673  # Privileged service called
    selection_network_access:
        LogonType:
            - 3   # Network
            - 8   # NetworkCleartext
            - 9   # NewCredentials
    selection_privilege_escalation:
        PrivilegeList|contains:
            - 'SeDebugPrivilege'
            - 'SeImpersonatePrivilege'
            - 'SeTakeOwnershipPrivilege'
            - 'SeBackupPrivilege'
    condition: selection_guest_logon and (selection_suspicious_activity or
               selection_network_access or selection_privilege_escalation)
level: high
fields:
    - TargetUserName
    - LogonType
    - IpAddress
    - PrivilegeList
    - ProcessName
falsepositives:
    - Legitimate guest account usage in kiosk environments
    - Web server anonymous access
    - Public computer access scenarios
references:
    - https://attack.mitre.org/techniques/T1078/003/
technique: T1078.003