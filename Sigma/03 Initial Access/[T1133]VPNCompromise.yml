title: VPN Service Compromise Detection
id: e5f6g7h8-i9j0-1234-efgh-567890123456
status: experimental
description: >-
  Detects unauthorized VPN access patterns indicating compromised VPN credentials or services
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1133/
logsource:
  product: windows
  service: security
detection:
  selection_vpn:
  EventID:
  LogonType:
  ProcessName|contains:
      - 'openvpn'
      - 'vpnclient'
      - 'anyconnect'
      - 'forticlient'
  selection_suspicious:
  SourceNetworkAddress|startswith:
      - '10.'
      - '172.'
      - '192.168.'
  TargetUserName|contains:
  selection_timing:
  EventID:
    timeframe:
  condition: selection_vpn and not selection_suspicious or (selection_timing | count() > 3)
falsepositives:
  - Legitimate VPN connections from remote workers
  - VPN reconnection after network issues
level: high
tags:
  - attack.initial_access
  - attack.t1133
  - windows
  - vpn
technique: T1133
