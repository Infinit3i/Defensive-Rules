title: Phishing Email with ISO VHD Image Attachment
id: 8b4d5e2a-9c3f-4a1b-b8e7-d6f4c9a2b5e8
status: experimental
description: Detects phishing emails with ISO/VHD image attachments commonly used to bypass email security controls
author: Infinit3i
date: 2026/04/27
references:
    - https://attack.mitre.org/techniques/T1566/001/
logsource:
    product: email-security
    service: exchange
detection:
    selection_attachment:
        AttachmentName|endswith:
            - '.iso'
            - '.vhd'
            - '.img'
            - '.dmg'
    selection_sender:
        SenderDomain|contains:
            - 'temp'
            - 'disposable'
            - 'guerrillamail'
            - '10minutemail'
    selection_subject:
        Subject|contains:
            - 'urgent'
            - 'invoice'
            - 'payment'
            - 'document'
            - 'scan'
    condition: selection_attachment and (selection_sender or selection_subject)
level: high
tags:
    - attack.initial-access
    - attack.t1566
    - attack.t1566.001
    - email
technique:
    name: Phishing
    id: T1566
    subtechnique:
        name: Spearphishing Attachment
        id: T1566.001