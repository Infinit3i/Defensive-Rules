---
title: Unauthorized Package Manager Activity on Networking Equipment
technique: T1195
id: e2f4a789-bc12-345d-8abc-1234567890ab
status: experimental
description: >-
  Detects cloud-based security attacks and access attempts. Detects unauthorized package manager activity on networking equipment by monitoring syslog events for commands like 'install add file', 'install activate', 'upgrade file', or 'software install' that may indicate unsanctioned software or firmware changes.
references:
  - https://attack.mitre.org/techniques/T1195/
author: Infinit3i
date: 2025-04-08
tags:
  - attack.initial_access
  - attack.t1195
  - windows
  - sysmon
  - attack.supply_chain_compromise
logsource:
  product: network
  service: syslog
  category: package
detection:
  selection:
  Message|contains:
      - "install add file"
      - "install activate"
      - "upgrade file"
      - "software install"
  condition: selection
falsepositives:
  - Legitimate and scheduled software or firmware updates performed by authorized network administrators.
level: medium
