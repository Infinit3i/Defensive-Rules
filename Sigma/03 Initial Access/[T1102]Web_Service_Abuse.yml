---
title: Legitimate Web Service Abuse
technique: T1102
id: d8f3e6a2-9c4b-4e7f-a1d5-8f3e9c6d4a8b
status: experimental
description: >-
  Detects cloud-based security attacks and access attempts. Detects abuse of legitimate web services for malicious purposes including command and control communications, data exfiltration, or malware hosting using trusted platforms to bypass security controls.
references:
  - https://attack.mitre.org/techniques/T1102/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.initial_access
  - attack.t1102
  - windows
  - sysmon
  - attack.command_and_control
  - web_service
  - cloud_service
logsource:
  product: zeek
  service: http
detection:
  cloud_services:
  host|endswith:
      - '.dropbox.com'
      - '.googledrive.com'
      - '.onedrive.com'
      - '.github.com'
      - '.pastebin.com'
  suspicious_uploads:
  method:
  request_body_len|gte:
  encoded_content:
  uri|contains:
      - 'base64'
      - 'encoded'
      - '%20%20%20'
  condition: cloud_services and (suspicious_uploads or encoded_content)
falsepositives:
  - Legitimate cloud service usage
  - Normal file uploads and downloads
level: low
