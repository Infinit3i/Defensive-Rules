---
title: Hardware Supply Chain Compromise Detection
technique: T1195.002
id: b8e3f2a5-6c9d-4f7e-a1b4-9e2c7f8d3a6b
status: experimental
description: >-
  Detects cloud-based security attacks and access attempts. Detects potential hardware supply chain compromises by monitoring for unexpected USB device insertions, unknown hardware components, or suspicious driver installations that may indicate compromised hardware.
references:
  - https://attack.mitre.org/techniques/T1195/002/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.initial_access
  - attack.t1195.002
  - windows
  - sysmon
  - supply_chain
  - hardware
  - usb
logsource:
  product: windows
  service: security
detection:
  usb_insertion:
  EventID:
  DeviceDescription|contains:
      - 'USB'
      - 'Mass Storage'
  unknown_driver:
  EventID:
  ServiceName|contains:
      - 'usb'
      - 'storage'
      - 'disk'
  StartType:
  pnp_device:
  EventID:
  DeviceInstanceId|startswith:
      - 'USB\'
      - 'USBSTOR\'
  condition: usb_insertion or unknown_driver or pnp_device
falsepositives:
  - Legitimate USB devices and storage
  - Authorized hardware installations
level: medium
