title: Secrets Exposure in Git Repositories
id: n4o5p6q7-r8s9-0123-nopq-456789012345
status: experimental
description: >-
  Detects potential secrets and credentials committed to version control repositories
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1552/001/
logsource:
  product: windows
  service: sysmon
detection:
  selection_git:
    EventID: 1
    Image|endswith:
    CommandLine|contains:
      - 'commit'
      - 'add'
      - 'push'
  selection_files:
    CommandLine|contains:
      - '.env'
      - 'credentials'
      - 'secrets'
      - 'config'
      - '.pem'
      - '.key'
  selection_patterns:
    CommandLine|regex:
      - '.*password.*=.*'
      - '.*token.*=.*'
      - '.*secret.*=.*'
      - '.*api_key.*=.*'
  condition: selection_git and (selection_files or selection_patterns)
falsepositives:
  - Legitimate configuration file commits
  - Template files with placeholder values
level: high
tags:
  - attack.initial_access
  - attack.t1552.001
  - sysmon
  - git
technique: T1552.001
