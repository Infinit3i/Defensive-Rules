---
title: Trusted Relationship Abuse Detection
technique: T1199
id: c9e4f7a2-6b8d-4f1e-a5c3-8f2e9d1c7a6b
status: experimental
description: >-
  Detects cloud-based security attacks and access attempts. Detects abuse of trusted relationships by monitoring for suspicious access from partner networks, third-party connections, or trusted
  domain accounts that may indicate compromise of trusted entities.
references:
  - https://attack.mitre.org/techniques/T1199/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.initial_access
  - attack.t1199
  - windows
  - sysmon
  - trusted_relationship
  - third_party
  - partner
logsource:
  product: windows
  service: security
detection:
  external_domain:
    EventID:
    TargetDomainName|endswith:
      - '.partner.com'
      - '.vendor.com'
      - '.contractor.com'
  service_account:
    EventID:
    TargetUserName|startswith:
      - 'svc-'
      - 'service-'
    LogonType:
  unusual_hours:
    EventID:
    TimeGenerated|contains:
      - 'T20:'
      - 'T21:'
      - 'T22:'
      - 'T23:'
      - 'T00:'
      - 'T01:'
  condition: external_domain or (service_account and unusual_hours)
falsepositives:
  - Legitimate partner access
  - Authorized third-party services
level: medium
