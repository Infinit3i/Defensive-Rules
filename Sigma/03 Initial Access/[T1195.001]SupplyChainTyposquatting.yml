title: Supply Chain Typosquatting Package Installation
id: e4c7d9f3-8a6b-2e5c-9f8e-d7a4c6e9b2f5
status: experimental
description: >-
  Detects installation of typosquatted packages that mimic legitimate software libraries
author: Infinit3i
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1195/001/
logsource:
  product: package-manager
  service: npm
detection:
  selection_suspicious_names:
    PackageName|contains:
      - 'requesst'
      - 'beautifulsoup'
      - 'urllibz'
      - 'numpyy'
      - 'pillow1'
      - 'lodaash'
  selection_low_downloads:
    DownloadCount|lt:
  selection_recent_creation:
    PackageAge|lt:
  selection_suspicious_author:
    - AuthorName|length: 3
    - AuthorEmail|contains: 'temp'
    - AuthorEmail|contains: 'disposable'
  condition: |
    selection_suspicious_names and (selection_low_downloads or selection_recent_creation or selection_suspicious_author)
level: high
tags:
  - attack.initial-access
  - attack.t1195
  - attack.t1195.001
  - supply-chain
  - package-manager
technique: T1195.001
