title: USB Autorun Execution Detection
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: Detects suspicious autorun execution from removable media devices through autorun.inf files
author: Infinit3i
date: 2026/04/27
references:
    - https://attack.mitre.org/techniques/T1091/
logsource:
    product: windows
    service: sysmon
detection:
    selection_autorun:
        EventID: 1
        Image|contains:
            - '\autorun.exe'
            - '\setup.exe'
            - '\install.exe'
        CommandLine|contains: 'autorun'
    selection_removable:
        EventID: 1
        Image|startswith:
            - 'D:\'
            - 'E:\'
            - 'F:\'
            - 'G:\'
            - 'H:\'
    condition: selection_autorun and selection_removable
falsepositives:
    - Legitimate software installation from removable media
    - Authorized portable applications
level: high
tags:
    - attack.initial_access
    - attack.t1091
    - sysmon
    - windows
technique: T1091