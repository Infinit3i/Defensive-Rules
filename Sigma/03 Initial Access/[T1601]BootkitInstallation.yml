title: Bootkit Installation Detection
id: t0u1v2w3-x4y5-6789-tuvw-012345678901
status: experimental
description: Detects bootkit installation through master boot record modifications and boot sector changes
author: Infinit3i
date: 2026/04/27
references:
    - https://attack.mitre.org/techniques/T1601/
logsource:
    product: windows
    service: sysmon
detection:
    selection_disk:
        EventID: 1
        Image|endswith:
            - '\diskpart.exe'
            - '\bcdedit.exe'
            - '\bootrec.exe'
    selection_commands:
        CommandLine|contains:
            - '/set bootstatuspolicy'
            - 'recoveryenabled no'
            - 'ignoreallfailures'
            - 'fixmbr'
    selection_files:
        EventID: 11
        TargetFilename|contains:
            - 'bootmgr'
            - 'ntldr'
            - 'boot.ini'
    condition: (selection_disk and selection_commands) or selection_files
falsepositives:
    - System recovery operations
    - Legitimate boot configuration changes
level: critical
tags:
    - attack.initial_access
    - attack.t1601
    - sysmon
    - bootkit
technique: T1601