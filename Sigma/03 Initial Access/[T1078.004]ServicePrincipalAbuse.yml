title: Service Principal Abuse in Cloud Environment
id: b2c3d4e5-f6a7-8901-2345-6789abcdef01
status: experimental
description: >-
  Detects abuse of service principals for unauthorized cloud resource access and privilege escalation
author: Infinit3i
date: 2026/04/27
modified: 2026/04/27
tags:
  - attack.initial_access
  - attack.t1078.004
  - attack.credential_access
  - azure
  - cloud
  - service_principal
logsource:
  product: azure
  service: auditlogs
detection:
  selection_sp_activity:
  Category:
  ActivityDisplayName|contains:
      - 'Add service principal'
      - 'Update service principal'
      - 'Add application'
  selection_suspicious_permissions:
  TargetResources.modifiedProperties.newValue|contains:
      - 'Application.ReadWrite.All'
      - 'Directory.ReadWrite.All'
      - 'RoleManagement.ReadWrite.Directory'
      - 'User.ReadWrite.All'
  selection_credential_ops:
  ActivityDisplayName|contains:
      - 'Add service principal credentials'
      - 'Update application – Certificates and secrets management'
  selection_unusual_source:
  InitiatedBy.app.appId|exists:
  InitiatedBy.user.userPrincipalName|re:
  condition: |
    (selection_sp_activity and selection_suspicious_permissions) or
    (selection_credential_ops and selection_unusual_source)
level: high
fields:
  - ActivityDisplayName
  - InitiatedBy.user.userPrincipalName
  - InitiatedBy.app.displayName
  - TargetResources.displayName
  - Result
falsepositives:
  - Legitimate service principal management
  - Application deployment automation
  - DevOps pipeline service account creation
references:
  - https://attack.mitre.org/techniques/T1078/004/
technique: T1078.004
