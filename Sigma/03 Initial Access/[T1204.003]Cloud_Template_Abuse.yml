---
title: Cloud Infrastructure Template Abuse Detection
technique: T1204.003
id: 3d7a5c8b-2e6f-4a9e-b4c6-6f3e7d5c8a9b
status: experimental
description: Detects abuse of cloud infrastructure templates containing malicious payloads through VM deployment and template instantiation monitoring.
references:
  - https://attack.mitre.org/techniques/T1204/003/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.initial_access
  - attack.t1204.003
  - cloud_template
  - vm_deployment
  - infrastructure
  - windows
logsource:
  product: windows
  service: powershell
  category: script_block
detection:
  cloud_cmdlets:
  ScriptBlockText|contains:
      - 'New-AzVM'
      - 'New-EC2Instance'
      - 'az vm create'
      - 'gcloud compute'
  suspicious_templates:
  ScriptBlockText|contains:
      - 'custom-script-extension'
      - 'cloud-init'
      - 'user-data'
      - 'startup-script'
  malicious_indicators:
  ScriptBlockText|contains:
      - 'Invoke-WebRequest'
      - 'wget'
      - 'curl'
      - 'base64'
      - 'powershell -enc'
  automated_deployment:
  ScriptBlockText|contains:
      - 'foreach'
      - 'while'
      - 'Start-Job'
      - 'Invoke-Parallel'
  condition: cloud_cmdlets and (suspicious_templates or malicious_indicators) and automated_deployment
falsepositives:
  - Legitimate infrastructure deployment
  - DevOps automation
  - Cloud migration activities
level: high
