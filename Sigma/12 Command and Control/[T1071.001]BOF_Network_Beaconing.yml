---
title: BOF Network Beaconing Communication Pattern
technique: T1071.001
id: a4b2c3d4-e5f6-7890-1234-567890abcdef
status: experimental
description: Detects BOF C2 beaconing through regular intervals and payload patterns
author: matthewiver@protonmail.com
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://www.cobaltstrike.com/blog/beacon-object-files-luser-defined-reflective-loader/
logsource:
  product: zeek
  service: http
detection:
  regular_beacons:
    method: 'GET'
    uri|contains:
      - '/updates'
      - '/check'
      - '/ping'
  payload_patterns:
    uri|contains:
      - 'exec='
      - 'cmd='
      - 'run='
    user_agent|contains:
      - 'Mozilla/4.0'
      - 'curl'
  timing_pattern:
    interval_variance|lte: 5
    request_count|gte: 10
  condition: (regular_beacons or payload_patterns) and timing_pattern
fields:
  - src_ip
  - dest_ip
  - uri
  - user_agent
  - method
  - response_code
falsepositives:
  - Legitimate software update checks
  - Health monitoring systems
  - Automated backup systems
level: medium
tags:
  - attack.command_and_control
  - attack.t1071.001
  - bof
  - beaconing
  - zeek
  - network
