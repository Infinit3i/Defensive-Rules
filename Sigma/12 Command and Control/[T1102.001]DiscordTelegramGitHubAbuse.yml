title: Legitimate Service Abuse for Command and Control
technique: T1102.001
author: Infinit3i
id: 8e4f7c2d-9a1b-4e3c-8f7a-5b9d6e2c4a8f
status: experimental
description: Detects abuse of legitimate services like Discord, Telegram, and GitHub for command and control operations
logsource:
  product: proxy
  service: web
detection:
  selection_discord:
    c-uri|contains:
      - 'discord.com/api/webhooks'
      - 'discordapp.com/api/webhooks'
      - 'cdn.discordapp.com'
  selection_telegram:
    c-uri|contains:
      - 'api.telegram.org/bot'
      - 't.me/bot'
  selection_github:
    c-uri|contains:
      - 'api.github.com/repos'
      - 'raw.githubusercontent.com'
      - 'gist.githubusercontent.com'
  selection_pastebin:
    c-uri|contains:
      - 'pastebin.com/raw'
      - 'paste.ee/r'
      - 'hastebin.com/raw'
  selection_suspicious_activity:
    cs-method:
      - 'POST'
      - 'PUT'
      - 'PATCH'
  selection_automated:
    c-useragent|contains:
      - 'python'
      - 'curl'
      - 'wget'
      - 'powershell'
      - 'bot'
  frequency_condition:
    - count() by src_ip > 20
    - timeframe: 5m
  condition: (selection_discord or selection_telegram or selection_github or selection_pastebin) and selection_suspicious_activity and selection_automated
level: high
tags:
  # MITRE ATT&CK tactic
  - attack.command_and_control
  # MITRE ATT&CK technique
  - attack.t1102.001
  # Platform/tool tags
  - windows
  - sysmon
  - attack.command_and_control
  - attack.t1102.001
  - attack.t1071.001
  - legitimate_service_abuse
  - discord
  - telegram
  - github
references:
  - https://attack.mitre.org/techniques/T1102/001/
  - https://attack.mitre.org/techniques/T1071/001/
