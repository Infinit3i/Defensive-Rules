---
title: Domain Fronting for Command and Control
technique: T1090.004
id: f8c5e9a2-6d4b-4e7f-f8c5-9e2a6d4b7f8b
status: experimental
description: >-
  >- Detects domain fronting for command and control by monitoring for CDN usage with mismatched SNI/Host headers, domain fronting patterns, or traffic routing through content delivery networks.
references:
  - https://attack.mitre.org/techniques/T1090/004/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.command_and_control
  - attack.t1090.004
  - windows
  - sysmon
  - domain_fronting
  - cdn
  - traffic_routing
logsource:
  product: zeek
  service: ssl
detection:
  cdn_hosts:
  server_name|endswith:
      - '.cloudfront.net'
      - '.azureedge.net'
      - '.fastly.com'
      - '.cloudflare.com'
  sni_mismatch:
  server_name:
  not:
  unusual_cert:
  cert_subject|contains:
      - 'cloudflare'
      - 'amazonaws'
  established:
    condition: cdn_hosts and (sni_mismatch or unusual_cert)
falsepositives:
  - Legitimate CDN usage
  - Content delivery services
level: medium
