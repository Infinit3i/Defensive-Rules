---
title: External Proxy for Command and Control
technique: T1090.002
id: d6a9f4e7-8c2b-4e5f-d6a9-4f7e8c2b5d6b
status: experimental
description: >-
  >- Detects external proxy usage for command and control by monitoring for connections to known proxy services, SOCKS proxy usage, or external traffic redirection that may be used to hide C2 communications.
references:
  - https://attack.mitre.org/techniques/T1090/002/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.command_and_control
  - attack.t1090.002
  - windows
  - sysmon
  - external_proxy
  - socks
  - proxy_service
logsource:
  product: zeek
  service: conn
detection:
  proxy_ports:
  id.resp_p|contains:
      - 1080
      - 8080
      - 3128
      - 8888
  socks_traffic:
  service:
  id.resp_p:
  orig_bytes|gte:
  proxy_services:
  service:
  id.resp_p:
  orig_bytes|gte:
    condition: proxy_ports and (socks_traffic or proxy_services)
falsepositives:
  - Legitimate proxy usage
  - Corporate proxy servers
level: medium
