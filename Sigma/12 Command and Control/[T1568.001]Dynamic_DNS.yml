---
title: Dynamic DNS for Command and Control
technique: T1568.001
id: a9c6f3e4-7b8d-4e5f-a9c6-3f4e7b8d5a9b
status: experimental
description: >-
  >- Detects dynamic DNS usage for command and control by monitoring for connections to dynamic DNS providers, frequently changing DNS records, or suspicious domain resolution patterns.
references:
  - https://attack.mitre.org/techniques/T1568/001/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.command_and_control
  - attack.t1568.001
  - windows
  - sysmon
  - dynamic_dns
  - dns_provider
  - c2_infrastructure
logsource:
  product: zeek
  service: dns
detection:
  ddns_providers:
  query|endswith:
      - '.dyndns.org'
      - '.no-ip.com'
      - '.ddns.net'
      - '.freedns.org'
  short_ttl:
  TTL|lte:
  qtype_name:
  frequent_changes:
  query|count|gte:
  answers|count|gte:
    condition: ddns_providers or short_ttl or frequent_changes
falsepositives:
  - Legitimate dynamic DNS usage
  - Home network services
level: medium
