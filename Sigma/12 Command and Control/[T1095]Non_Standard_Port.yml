---
title: Command and Control via Non-Standard Ports
technique: T1095
id: a9d6f3e8-7c5b-4e4f-a9d6-3f8e7c5b4a9b
status: experimental
description: >-
  >- Detects command and control communications via non-standard ports by monitoring for services running on unusual ports, port hopping, or protocol mismatches that may indicate C2 evasion techniques.
references:
  - https://attack.mitre.org/techniques/T1095/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.command_and_control
  - attack.t1095
  - windows
  - sysmon
  - non_standard_port
  - port_evasion
  - c2_communication
logsource:
  product: zeek
  service: conn
detection:
  unusual_ports:
    id.resp_p|gte:
    id.resp_p|lte:
    service:
    high_ports:
    id.resp_p|gte:
    orig_bytes|gte:
    resp_bytes|gte:
    protocol_mismatch:
    id.resp_p:
    service:
  condition: unusual_ports or high_ports or protocol_mismatch
falsepositives:
  - Application-specific ports
  - Development servers
level: low
