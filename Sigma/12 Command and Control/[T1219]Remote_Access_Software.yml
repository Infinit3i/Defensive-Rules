---
title: Remote Access Software for Command and Control
technique: T1219
id: a6c9f4e8-7b5d-4e2f-a6c9-4f8e7b5d2a6b
status: experimental
description: >-
  Detects remote access software usage for command and control by monitoring
  for TeamViewer, VNC, RDP, or other remote access tools that may be
  abused for unauthorized system access and C2 communications.
references:
  - https://attack.mitre.org/techniques/T1219/
author: Infinit3i
date: 2026-04-27
tags:
  # MITRE ATT&CK tactic
  - attack.command_and_control
  # MITRE ATT&CK technique
  - attack.t1219
  # Platform/tool tags
  - windows
  - sysmon
  - attack.command_and_control
  - attack.t1219
  - remote_access
  - teamviewer
  - vnc
logsource:
  product: windows
  service: sysmon
  category: process_creation
detection:
  remote_tools:
    Image|endswith:
      - '\teamviewer.exe'
      - '\vnc.exe'
      - '\anydesk.exe'
      - '\logmein.exe'
  suspicious_args:
    CommandLine|contains:
      - '/password'
      - '/connect'
      - '/silent'
      - '/hide'
  network_access:
    Image|contains:
      - 'remote'
      - 'access'
      - 'desktop'
  condition: remote_tools or (suspicious_args and network_access)
falsepositives:
  - Legitimate remote support
  - Authorized remote access
level: medium
