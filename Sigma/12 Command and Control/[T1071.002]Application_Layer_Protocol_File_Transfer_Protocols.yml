---
title: Command and Control via File Transfer Protocols
technique: T1071.002
id: b7e4f9c2-6a8d-4e3f-b7e4-9f2c6a8d3b7b
status: experimental
description: >-
  >- Detects command and control communications via file transfer protocols by monitoring for suspicious FTP, SFTP, or SCP activities that may be used for C2 communications or file staging.
references:
  - https://attack.mitre.org/techniques/T1071/002/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.command_and_control
  - attack.t1071.002
  - windows
  - sysmon
  - file_transfer
  - ftp
  - sftp
logsource:
  product: zeek
  service: conn
detection:
  ftp_ports:
  id.resp_p|contains:
      - 21
      - 22
      - 990
      - 989
  suspicious_transfer:
  service:
  orig_bytes|gte:
  resp_bytes|gte:
  encrypted_ftp:
  service:
  id.resp_p:
  orig_bytes|lte:
    condition: ftp_ports and (suspicious_transfer or encrypted_ftp)
falsepositives:
  - Legitimate file transfers
  - System backups
level: low
