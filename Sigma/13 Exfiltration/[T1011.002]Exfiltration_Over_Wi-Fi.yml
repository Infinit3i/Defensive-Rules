---
title: Data Exfiltration Over Wi-Fi
technique: T1011.002
id: a7d9f5c8-6b3e-4e2f-a7d9-5f8c6b3e2a7b
status: experimental
description: >-
  >- Detects data exfiltration over Wi-Fi by monitoring for suspicious wireless network connections, ad-hoc Wi-Fi networks, or data transfers via unauthorized wireless access points.
references:
  - https://attack.mitre.org/techniques/T1011/002/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1011.002
  - windows
  - sysmon
  - wifi
  - wireless
  - access_point
logsource:
  product: windows
  service: wlansvc
detection:
  wifi_connection:
  EventID:
  SSID|contains:
      - 'free'
      - 'guest'
      - 'open'
      - 'public'
  adhoc_network:
  EventID:
  NetworkType:
  suspicious_ap:
  EventID:
  SecurityType:
  SignalStrength|gte:
    condition: wifi_connection or adhoc_network or suspicious_ap
falsepositives:
  - Legitimate public Wi-Fi usage
  - Guest network connections
level: low
