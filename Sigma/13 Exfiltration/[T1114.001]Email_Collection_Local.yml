---
title: Local Email Collection Detection
technique: T1114.001
id: f9c6e4a7-8b3d-4e5f-f9c6-4e7a8b3d5f9b
status: experimental
description: >-
  >- Detects local email collection activities by monitoring for email database access, PST file operations, or mailbox enumeration that may indicate attempts to collect email data for exfiltration.
references:
  - https://attack.mitre.org/techniques/T1114/001/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1114.001
  - windows
  - sysmon
  - attack.collection
  - email
  - mailbox
logsource:
  product: windows
  service: sysmon
  category: file_access
detection:
  pst_access:
    TargetFilename|endswith:
      - '.pst'
      - '.ost'
      - '.edb'
    outlook_db:
    TargetFilename|contains:
      - '\Outlook\'
      - '\Microsoft\Outlook\'
    email_export:
    Image|endswith:
    CommandLine|contains:
      - '/export'
      - '/backup'
  condition: pst_access or outlook_db or email_export
falsepositives:
  - Legitimate email backup operations
  - Email client maintenance
level: medium
