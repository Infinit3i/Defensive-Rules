---
title: Scheduled Data Transfer Detection
technique: T1029
id: c9f5e3a7-8d6b-4e2f-c9f5-3e7a8d6b2c9b
status: experimental
description: >-
  >- Detects scheduled data transfers by monitoring for automated file transfers, recurring upload patterns, or scheduled tasks that may be used to systematically exfiltrate data over time.
references:
  - https://attack.mitre.org/techniques/T1029/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1029
  - windows
  - sysmon
  - scheduled_transfer
  - automation
  - data_transfer
logsource:
  product: windows
  service: taskscheduler
detection:
  scheduled_upload:
    EventID:
    TaskName|contains:
      - 'upload'
      - 'sync'
      - 'backup'
      - 'transfer'
    recurring_task:
    EventID:
    ActionName|contains:
      - 'curl'
      - 'wget'
      - 'powershell'
    network_task:
    EventID:
    TaskName|contains:
      - 'ftp'
      - 'http'
      - 'sftp'
  condition: scheduled_upload or recurring_task or network_task
falsepositives:
  - Legitimate backup operations
  - Authorized file synchronization
level: medium
