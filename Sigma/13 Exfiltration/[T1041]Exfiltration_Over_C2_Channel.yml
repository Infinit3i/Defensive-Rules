---
title: Exfiltration Over Command and Control Channel
technique: T1041
id: a5e9f3c7-8b2d-4e6f-a5e9-3f7c8b2d6a5b
status: experimental
description: >-
  >- Detects data exfiltration over command and control channels by monitoring for large outbound data transfers, suspicious network communications, or data encoding patterns that may indicate C2 exfiltration.
references:
  - https://attack.mitre.org/techniques/T1041/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1041
  - windows
  - sysmon
  - c2_channel
  - data_transfer
  - network
logsource:
  product: zeek
  service: conn
detection:
  large_upload:
  orig_bytes|gte:
  duration|gte:
  suspicious_destination:
  id.resp_h|startswith:
      - '10.'
      - '172.'
      - '192.168.'
  not:
  encrypted_traffic:
  service:
  orig_bytes|gte:
    condition: large_upload or (suspicious_destination and encrypted_traffic)
falsepositives:
  - Legitimate large file uploads
  - Cloud backup operations
level: medium
