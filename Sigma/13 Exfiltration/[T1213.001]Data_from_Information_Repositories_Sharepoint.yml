---
title: Data Collection from SharePoint Repositories
technique: T1213.001
id: c9f6e3a8-7d4b-4e5f-c9f6-3e8a7d4b5c9b
status: experimental
description: >-
  >- Detects suspicious data collection from SharePoint repositories by monitoring for bulk downloads, unusual access patterns, or automated data retrieval that may indicate data harvesting
  activities.
references:
  - https://attack.mitre.org/techniques/T1213/001/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1213.001
  - windows
  - sysmon
  - attack.collection
  - sharepoint
  - data_collection
logsource:
  product: o365
  service: sharepoint
detection:
  bulk_download:
    Operation:
    ItemType:
    ObjectId|count|gte:
  automated_access:
    UserAgent|contains:
      - 'curl'
      - 'wget'
      - 'python'
      - 'powershell'
  sensitive_files:
    Operation:
    SourceFileName|endswith:
      - '.xlsx'
      - '.docx'
      - '.pdf'
  condition: bulk_download or automated_access or sensitive_files
falsepositives:
  - Legitimate bulk file operations
  - Authorized automated processes
level: medium
