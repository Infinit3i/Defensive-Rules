---
title: Exfiltration to Instant Messaging Platforms
technique: T1567.004
id: b4c7f8e5-9a6d-4e2f-b4c7-8f5e9a6d2b4b
status: experimental
description: >-
  >- Detects data exfiltration to instant messaging platforms by monitoring for large uploads to messaging services, file sharing through chat applications, or suspicious messaging activity that may indicate data theft.
references:
  - https://attack.mitre.org/techniques/T1567/004/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1567.004
  - windows
  - sysmon
  - instant_messaging
  - chat_applications
  - file_sharing
logsource:
  product: zeek
  service: http
detection:
  messaging_platforms:
  host|endswith:
      - '.telegram.org'
      - '.discord.com'
      - '.slack.com'
      - '.whatsapp.com'
      - '.messenger.com'
  file_upload:
  method:
  request_body_len|gte:
  uri|contains:
      - '/upload'
      - '/file'
      - '/attach'
  api_messaging:
  uri|contains:
      - '/api/v'
      - '/webhooks'
      - '/bot'
  method:
    condition: messaging_platforms and (file_upload or api_messaging)
falsepositives:
  - Legitimate business communications
  - Authorized file sharing
level: medium
