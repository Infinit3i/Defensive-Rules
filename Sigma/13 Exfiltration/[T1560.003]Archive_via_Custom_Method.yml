---
title: Data Archiving via Custom Method
technique: T1560.003
id: e9f6c4a8-7d3b-4e5f-e9f6-4c8a7d3b5e9b
status: experimental
description: >-
  >- Detects data archiving via custom methods by monitoring for unusual file operations, custom compression algorithms, or non-standard data packaging techniques that may be used to evade
  detection during exfiltration.
references:
  - https://attack.mitre.org/techniques/T1560/003/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1560.003
  - windows
  - sysmon
  - attack.collection
  - custom_method
  - obfuscation
logsource:
  product: windows
  service: sysmon
  category: file_create
detection:
  unusual_extensions:
    TargetFilename|endswith:
      - '.dat'
      - '.bin'
      - '.tmp'
      - '.enc'
  large_files:
    FileSize|gte:
    TargetFilename|contains:
  custom_tools:
    ProcessName|contains:
      - 'custom'
      - 'pack'
      - 'bundle'
  condition: unusual_extensions or large_files or custom_tools
falsepositives:
  - Legitimate application data files
  - System temporary files
level: low
