---
title: Data Collection from Confluence Repositories
technique: T1213.002
id: d4a7f9e5-8c2b-4e6f-d4a7-9f5e8c2b6d4b
status: experimental
description: >-
  >- Detects suspicious data collection from Confluence repositories by monitoring for bulk page exports, unusual API usage, or automated content retrieval that may indicate data harvesting.
references:
  - https://attack.mitre.org/techniques/T1213/002/
author: Infinit3i
date: 2026-04-27
tags:
  - attack.exfiltration
  - attack.t1213.002
  - windows
  - sysmon
  - attack.collection
  - confluence
  - wiki
logsource:
  product: confluence
  service: audit
detection:
  bulk_export:
    action:
    objectType:
    objectName|count|gte:
    api_access:
    action:
    user_agent|contains:
      - 'curl'
      - 'wget'
      - 'python'
      - 'api'
    mass_viewing:
    action:
    objectType:
    userId|count|gte:
  condition: bulk_export or api_access or mass_viewing
falsepositives:
  - Legitimate documentation exports
  - Authorized API integrations
level: medium
