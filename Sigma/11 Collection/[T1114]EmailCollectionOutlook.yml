title: Outlook Email Collection via PowerShell
id: g7h8i9j0-k1l2-3456-7890-123456ghijkl
status: experimental
description: Detects PowerShell accessing Outlook email data for collection
author: Infinit3i
date: 2026/04/28
references:
  - https://attack.mitre.org/techniques/T1114/
tags:
  - attack.collection
  - attack.t1114
  - powershell
  - windows
logsource:
  product: windows
  service: powershell-classic
detection:
  selection:
  EventID:
  outlook_com:
  ScriptBlockText|contains:
      - 'Microsoft.Office.Interop.Outlook'
      - 'New-Object -ComObject Outlook.Application'
      - 'CreateObject("Outlook.Application")'
  email_access:
  ScriptBlockText|contains:
      - '.GetDefaultFolder'
      - '.Items'
      - '.Body'
      - '.Subject'
      - '.Attachments'
  condition: selection and outlook_com and email_access
falsepositives:
  - Legitimate email automation
  - System administration scripts
level: high
