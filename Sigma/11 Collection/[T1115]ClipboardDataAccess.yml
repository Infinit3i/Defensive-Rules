title: Clipboard Data Access via Windows API
id: e5f6g7h8-i9j0-1234-5678-901234efghij
status: experimental
description: Detects attempts to access clipboard data through Windows API calls
author: Infinit3i
date: 2026/04/28
references:
  - https://attack.mitre.org/techniques/T1115/
tags:
  - attack.collection
  - attack.t1115
  - sysmon
  - windows
logsource:
  product: windows
  service: sysmon
detection:
  selection:
  EventID:
  clipboard_tools:
      - Image|endswith: '\clip.exe'
      - CommandLine|contains: 'GetClipboardData'
  powershell:
  CommandLine|contains:
      - 'Get-Clipboard'
      - '[System.Windows.Forms.Clipboard]'
      - 'Add-Type -AssemblyName System.Windows.Forms'
  condition: selection and (clipboard_tools or powershell)
falsepositives:
  - Legitimate clipboard utilities
  - User applications
level: medium
