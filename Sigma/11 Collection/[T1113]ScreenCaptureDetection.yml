title: Screen Capture Tool Execution
id: c3d4e5f6-g7h8-9012-3456-789012cdefgh
status: experimental
description: Detects execution of screen capture tools and utilities
author: Infinit3i
date: 2026/04/28
references:
  - https://attack.mitre.org/techniques/T1113/
tags:
  - attack.collection
  - attack.t1113
  - sysmon
  - windows
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: 1
  tools:
    - Image|endswith: '\nircmd.exe'
    - Image|endswith: '\screencapture.exe'
    - Image|endswith: '\printscreen.exe'
    - CommandLine|contains: 'savescreenshot'
  powershell:
    CommandLine|contains:
      - 'Add-Type -AssemblyName System.Windows.Forms'
      - '[System.Windows.Forms.Screen]'
      - 'CopyFromScreen'
  condition: selection and (tools or powershell)
falsepositives:
  - Legitimate screenshot tools
  - System administration
level: medium
