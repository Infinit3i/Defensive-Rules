title: PowerShell Screen Capture Commands
id: d4e5f6g7-h8i9-0123-4567-890123defghi
status: experimental
description: Detects PowerShell commands used for screen capture operations
author: Infinit3i
date: 2026/04/28
references:
    - https://attack.mitre.org/techniques/T1113/
tags:
    - attack.collection
    - attack.t1113
    - powershell
    - windows
logsource:
    product: windows
    service: powershell-classic
detection:
    selection:
        EventID: 4104
    screen_apis:
        ScriptBlockText|contains:
            - 'System.Drawing.Graphics'
            - 'CopyFromScreen'
            - 'System.Windows.Forms.Screen'
            - 'GetBounds'
    file_save:
        ScriptBlockText|contains:
            - '.Save('
            - 'bitmap'
            - '.png'
            - '.jpg'
            - '.bmp'
    condition: selection and screen_apis and file_save
falsepositives:
    - Legitimate PowerShell scripts
    - System monitoring tools
level: high