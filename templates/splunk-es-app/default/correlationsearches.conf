# correlationsearches.conf - ES Correlation Rules Template

# This file will be populated with correlation rules that aggregate
# individual detection alerts into higher-level security incidents

[defensive_rules_multiple_techniques_same_host]
search = | tstats count FROM datamodel=Notable_Events WHERE nodename=Notable_Events.src BY Notable_Events.src,Notable_Events.mitre_technique | where count > 3 | eval correlation_id=md5(src."|".mitre_technique) | table src,mitre_technique,count,correlation_id
description = Multiple MITRE techniques observed on same host
rule_name = Multiple MITRE Techniques - Same Host
security_domain = threat
severity = medium
default_status = new
default_owner = unassigned
drilldown_name = View techniques for host $src$
drilldown_search = | tstats values(Notable_Events.mitre_technique) FROM datamodel=Notable_Events WHERE nodename=Notable_Events.src="$src$" BY Notable_Events.src
rule_title = Multiple MITRE ATT&CK techniques on host: $src$
rule_description = Host $src$ has exhibited $count$ different MITRE ATT&CK techniques, suggesting potential advanced attack activity

[defensive_rules_rapid_fire_alerts]
search = | tstats count FROM datamodel=Notable_Events WHERE nodename=Notable_Events.src BY Notable_Events.src span=5m | where count > 5
description = Rapid succession of security alerts from same source
rule_name = Rapid Fire Security Alerts
security_domain = threat
severity = high
default_status = new
default_owner = unassigned
rule_title = Rapid fire alerts from $src$
rule_description = Source $src$ generated $count$ security alerts in 5 minutes, indicating potential automated attack activity