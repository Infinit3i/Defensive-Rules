# macros.conf - Reusable search macros for detection rules

[defensive_rules_windows_logs]
definition = (index=windows OR index=wineventlog OR index=sysmon)
iseval = 0

[defensive_rules_powershell_logs]
definition = index=windows (source="WinEventLog:Microsoft-Windows-PowerShell/Operational" OR source="WinEventLog:Windows PowerShell")
iseval = 0

[defensive_rules_sysmon_logs]
definition = index=windows source="WinEventLog:Microsoft-Windows-Sysmon/Operational"
iseval = 0

[defensive_rules_security_logs]
definition = index=windows source="WinEventLog:Security"
iseval = 0

[defensive_rules_network_logs]
definition = (index=network OR index=zeek OR index=bro OR index=suricata)
iseval = 0

[defensive_rules_linux_logs]
definition = (index=linux OR index=unix OR index=auth OR index=secure)
iseval = 0

[defensive_rules_exclude_common_false_positives]
definition = NOT (Image="*\\Windows\\System32\\svchost.exe" OR Image="*\\Windows\\System32\\wininit.exe" OR Image="*\\Windows\\System32\\services.exe")
iseval = 0

[defensive_rules_suspicious_parent_processes]
definition = (ParentImage="*\\cmd.exe" OR ParentImage="*\\powershell.exe" OR ParentImage="*\\wscript.exe" OR ParentImage="*\\cscript.exe" OR ParentImage="*\\mshta.exe" OR ParentImage="*\\rundll32.exe")
iseval = 0

[defensive_rules_high_privilege_accounts]
definition = (user=admin* OR user=root OR user=administrator OR user=system OR user=service* OR user=*admin*)
iseval = 0

[defensive_rules_mitre_attack_enrichment(2)]
args = technique_id,tactic
definition = eval mitre_technique="$technique_id$", mitre_tactic="$tactic$"
iseval = 0